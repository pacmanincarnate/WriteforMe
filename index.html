                            enabled: true,
                            budget: thinkingBudgetWriting,
                            level: thinkingLevelWriting,
                            effort: thinkingEffortWriting
                        };
                    }
                }

                const options = {
                    thinking: thinkingConfig,
                    timeout: apiTimeout * 1000,
                    onSuccess: (metadata) => {
                        setPromptLog(prev => prev.map(entry => {
                            if (entry.id === logId) {
                                return {
                                    ...entry,
                                    modelUsed: metadata.modelUsed,
                                    tokensUsed: metadata.tokensUsed,
                                    reasoningTokensUsed: metadata.reasoningTokensUsed,
                                    reasoningText: metadata.reasoningText
                                };
                            }
                            return entry;
                        }));
                    }
                };

                while (attempt < maxRetries) {
                    try {
                        if (apiProvider === 'gemini') {
                            return await callGemini(apiKey, modelToUse, prompt, systemPrompt, isJson, options);
                        } else {
                            return await callOpenRouter(openRouterKey, modelToUse, prompt, systemPrompt, isJson, options);
                        }
                    } catch (error) {
                        attempt++;
                        console.error(`AI call error [${logName}] (Attempt ${attempt}/${maxRetries}):`, error);
                        const isTransient = error?.message?.includes("503") || 
                                            error?.message?.includes("Service Unavailable") || 
                                            error?.message?.includes("Overloaded") ||
                                            error?.message?.includes("429") ||
                                            error?.message?.includes("rate limit") ||
                                            error?.message?.includes("Failed to fetch") ||
                                            error?.message?.includes("empty response body") ||
                                            error?.message?.includes("Unexpected end of JSON input") ||
                                            error?.message?.includes("invalid JSON") ||
                                            error?.message?.includes("returned no content") ||
                                            error?.message?.includes("timed out") ||
                                            error?.message?.includes("timeout") ||
                                            error instanceof TypeError;

                        if (isTransient && attempt < maxRetries) {
                            console.warn(`Transient API Error: ${error.message}. Retrying in 5 seconds... (Attempt ${attempt}/${maxRetries})`);
                            showToast(`API issue. Retrying step... (${attempt}/${maxRetries})`, 'warning');
                            await new Promise(resolve => setTimeout(resolve, 5000));
                        } else {
                            throw error;
                        }
                    }
                }
            };

            const generateCharacterProfile = async (charName, charRole, context, storyContext) => {
                const contextBlock = `
<world_bible>${storyContext?.concept || ""}</world_bible>
<character_briefs>
<char_id>C_${charName.replace(/\s+/g, '_')}</char_id>
${charName}
<brief_role>${charRole}</brief_role>
<core_flaw>${context}</core_flaw>
<core_desire>${context}</core_desire>
</character_briefs>
`;
                const prompt = `${contextBlock}\n\n<instruction>Provide the first-person interview for ${charName}.</instruction>`;
                const interviewOutput = await callAI(prompt, PROMPTS.characterDevelopment, false, "Character Developer (Tier 0.2)", "large");
                return extractTag(interviewOutput, 'first_person_interview') || interviewOutput;
            };

            const getCharacterDetails = async (charName, mutableCastList) => {
                const charIdx = mutableCastList.findIndex(c => c.name === charName);
                if (charIdx === -1) {
                    console.log(`Character ${charName} not found in cast.`);
                    return "Character details unavailable.";
                }
                const char = mutableCastList[charIdx];
                if (char.details?.deep_profile) return char.details.deep_profile;

                setLoadingStep(`Interviewing ${char.name}...`);
                const context = `Goals: ${char.details?.goals}, History: ${char.details?.history}, Events: ${char.details?.story_events}`;

                // Pass story context (concept, themes, style)
                const storyContext = {
                    concept: story.concept,
                    themes: story.themes,
                    style: story.style
                };

                const profile = await generateCharacterProfile(char.name, char.role, context, storyContext);

                if (!mutableCastList[charIdx].details) mutableCastList[charIdx].details = {};
                mutableCastList[charIdx].details.deep_profile = profile;
                return profile;
            };

            const isSceneComplete = (actIdx, sceneIdx) => {
                const sId = `${actIdx}-${sceneIdx}`;
                const beats = story.beats[sId];
                if (!beats || beats.length === 0) return false;
                // Check if ALL beats have final prose
                return beats.every((b, i) => story.prose[`${sId}-${i}`]?.final);
            };

            const handleBeatChange = (actIdx, sceneIdx, beatIdx, newText) => {
                const sId = `${actIdx}-${sceneIdx}`;
                setStory(prev => {
                    const newBeats = [...prev.beats[sId]];
                    newBeats[beatIdx] = { ...newBeats[beatIdx], description: newText };
                    return {
                        ...prev,
                        beats: {
                            ...prev.beats,
                            [sId]: newBeats
                        }
                    };
                });
            };


            const handleAddBeat = (actIdx, sceneIdx, insertAfterIdx) => {
                const sId = `${actIdx}-${sceneIdx}`;
                setStory(prev => {
                    const currentBeats = prev.beats[sId] ? [...prev.beats[sId]] : [];
                    const newBeat = {
                        number: insertAfterIdx + 2,
                        type: "Action",
                        description: "",
                        emotional_shift: "",
                        valence: 0,
                        mode_override: null
                    };
                    currentBeats.splice(insertAfterIdx + 1, 0, newBeat);
                    // Renumber all beats
                    const renumbered = currentBeats.map((b, i) => ({ ...b, number: i + 1 }));
                    return { ...prev, beats: { ...prev.beats, [sId]: renumbered } };
                });
                showToast(`Beat added after Beat ${insertAfterIdx + 1}`);
            };

            const handleDeleteBeat = (actIdx, sceneIdx, beatIdx) => {
                if (!window.confirm(`Delete Beat ${beatIdx + 1}? This will also remove its prose. This cannot be undone.`)) return;
                const sId = `${actIdx}-${sceneIdx}`;
                setStory(prev => {
                    const currentBeats = [...prev.beats[sId]];
                    currentBeats.splice(beatIdx, 1);
                    // Renumber remaining beats
                    const renumbered = currentBeats.map((b, i) => ({ ...b, number: i + 1 }));
                    // Remove prose for deleted beat and re-key subsequent prose
                    const newProse = {};
                    Object.keys(prev.prose).forEach(key => {
                        if (!key.startsWith(`${sId}-`)) {
                            newProse[key] = prev.prose[key];
                        }
                    });
                    // Re-add prose for remaining beats with correct keys
                    let proseIdx = 0;
                    for (let i = 0; i < (prev.beats[sId]?.length || 0); i++) {
                        if (i === beatIdx) continue; // skip deleted
                        const oldKey = `${sId}-${i}`;
                        const newKey = `${sId}-${proseIdx}`;
                        if (prev.prose[oldKey]) {
                            newProse[newKey] = prev.prose[oldKey];
                        }
                        proseIdx++;
                    }
                    return { ...prev, beats: { ...prev.beats, [sId]: renumbered }, prose: newProse };
                });
                showToast(`Beat ${beatIdx + 1} deleted`);
            };

            const requestSceneWeaving = (actIdx) => {
                if (story.scenes[actIdx]?.length > 0) {
                    if (!window.confirm("WARNING: Rerunning the Scene Weaver will overwrite ALL existing scenes and beats for this Act. This cannot be undone. Are you sure?")) return;
                }
                generateScenes(actIdx);
            };

            const requestBeatGeneration = (actIdx, sceneIdx) => {
                const sId = `${actIdx}-${sceneIdx}`;
                if (story.beats[sId]?.length > 0) {
                    if (!window.confirm("WARNING: Rerunning the Beat Director will overwrite ALL existing beats and prose for this scene. This cannot be undone. Are you sure?")) return;
                }
                generateBeats(actIdx, sceneIdx);
            };

            const generateScenes = async (actIndex, currentStory = story, isAutopilot = false) => {
                const storyToUse = currentStory || story;
                setLoading(true); setLoadingStep(`Weaving Scenes for Act ${actIndex + 1}...`);
                try {
                    const act = storyToUse.acts[actIndex];
                    const actNumber = act.number || actIndex + 1;

                    let previousEventsContext = "Start of Book";
                    if (actIndex > 0) {
                        const prevActScenes = storyToUse.scenes[actIndex - 1];
                        if (prevActScenes && prevActScenes.length > 0) {
                            const lastScenes = prevActScenes.slice(-2);
                            previousEventsContext = `\n\nEVENTS IMMEDIATELY PRECEDING THIS ACT:\n${lastScenes.map(s => `[PREVIOUS SCENE ${s.number}]: ${s.title}\n${s.description}`).join('\n\n')}`;
                        }
                    }

                    // RAG: Retrieve Relevant Context for the Act
                    const query = `Act ${act.number}: ${act.title}. ${act.description}. Themes: ${storyToUse.themes}`;
                    const ragLoreDocs = await retrieveContext(query, 0.6, (meta) => {
                        return !meta.valid_from_act || meta.valid_from_act <= actNumber;
                    });
                    const ragContext = ragLoreDocs.length > 0
                        ? ragLoreDocs.map(d => `- [${d.metadata.topic}]: ${d.text}`).join('\n')
                        : `World Bible: ${storyToUse.status_quo}`;

                    // Style Context
                    const styleContext = storyToUse.style ? `Genre: ${storyToUse.style.genre || 'Unspecified'}, Mood: ${storyToUse.style.mood || 'Unspecified'}, Style: ${storyToUse.style.writing_guide || 'Standard'}` : '';

                    // Relationships Context
                    let currentRelationshipsContext = "None established.";
                    if (storyToUse.relationships && Object.keys(storyToUse.relationships).length > 0) {
                        const relStrings = [];
                        Object.keys(storyToUse.relationships).forEach(key => {
                            const rel = storyToUse.relationships[key];
                            if (rel && rel.current) {
                                const [from, to] = key.split("->");
                                relStrings.push(`- **${from}** toward **${to}**: ${rel.current}`);
                            }
                        });
                        if (relStrings.length > 0) {
                            currentRelationshipsContext = relStrings.join('\n');
                        }
                    }

                    // Run Edit Router for Scenes (Tier 3.1 & 3.2)
                    const sceneResult = await runAgentWithEscalation({
                        tierName: "Scene Agent",
                        isAutopilot,
                        generatorPromptFn: () => `
<act_mandate>
${act.act_mandate || act.description}
</act_mandate>
<world_developments>
${act.world_building_developments || ""}
</world_developments>
<active_threads>
${(storyToUse.threads || []).map(t => `<thread><thread_id>${t.id}</thread_id><name>${t.name}</name><description>${t.description}</description></thread>`).join('\n')}
</active_threads>
<cast_list>
${storyToUse.cast.map(c => `- ${c.name} (${c.role}): Flaw: ${c.core_flaw}`).join('\n')}
</cast_list>
<relationships>
${currentRelationshipsContext}
</relationships>
<world_lore_context>
${ragContext}
</world_lore_context>
<previous_scene_ending_context>
${previousEventsContext}
</previous_scene_ending_context>
<style_instructions>
${styleContext}
</style_instructions>

<available_narrative_modes>
${allNarrativeModesXml}
</available_narrative_modes>
`,
                        systemPrompt: PROMPTS.sceneAgent,
                        reviewerSystemPrompt: PROMPTS.sceneReview,
                        reviewerPromptFn: (genOutput) => `
<act_mandate>
${act.act_mandate || act.description}
</act_mandate>
<previous_events_context>
${previousEventsContext}
</previous_events_context>
<generated_scene_sequence>
${genOutput}
</generated_scene_sequence>
`,
                        parserFn: (text) => {
                            const sceneBlocks = extractAllTags(text, 'scene_sequence');
                            const parsedScenes = sceneBlocks.map(extractScene);
                            
                            // Map cast_names and format for downstream compatibility
                            parsedScenes.forEach(s => {
                                s.cast_names = s.cast_ids.map(id => {
                                    const char = storyToUse.cast.find(c => c.id === id || c.name === id);
                                    return char ? char.name : id;
                                });
                                // Keep number compatible
                                s.number = s.id;
                            });
                            return { scenes: parsedScenes };
                        },
                        modelSize: "large",
                        spawningContext: `Act ${actNumber} Scene Weaving`,
                        parentTierFailFn: async (reasons) => {
                            // Cascading deletion callback
                            setStory(prev => {
                                const nextStory = { ...prev };
                                nextStory.acts = [];
                                nextStory.scenes = {};
                                return nextStory;
                            });
                            setFeedbackLedger(prev => ({
                                ...prev,
                                "Act Agent": reasons
                            }));
                        },
                        activeActNum: actNumber,
                        activeSceneNum: 1
                    });

                    const nextStory = {
                        ...storyToUse,
                        scenes: { ...storyToUse.scenes, [actIndex]: sceneResult.parsedData.scenes },
                        cast: story.cast
                    };

                    // Merge relationship updates
                    const newRels = { ...(nextStory.relationships || {}) };
                    sceneResult.parsedData.scenes.forEach(scene => {
                        if (scene.relationship_shifts && scene.relationship_shifts.length > 0) {
                            scene.relationship_shifts.forEach(shift => {
                                const key = `${shift.from}->${shift.to}`;
                                if (!newRels[key]) newRels[key] = { current: "", history: [] };
                                newRels[key].current = shift.new_feeling;
                                newRels[key].history.push({
                                    chapter: `Act ${actNumber}, Scene ${scene.number}`,
                                    change: `${shift.new_feeling} (Wove shift)`
                                });
                            });
                        }
                    });
                    nextStory.relationships = newRels;

                    setStory(nextStory);
                    setSelectedAct(actIndex);
                    showToast(`Scenes for Act ${actNumber} wove successfully!`);
                    return nextStory;
                } catch (e) {
                    console.error("Scene generation failed:", e);
                    if (isAutopilot) {
                        showToast(`Cascading deletion: Scene generation failed. Rolling back to Act Agent...`, 'warning');
                        return new Promise((resolve) => {
                            setTimeout(() => {
                                const clearedStory = {
                                    ...currentStory,
                                    acts: [],
                                    scenes: {}
                                };
                                resolve(clearedStory);
                            }, 100);
                        });
                    } else {
                        alert("Scene generation failed: " + e.message);
                        throw e;
                    }
                } finally {
                    if (!isAutopilot) setLoading(false);
                }
            };

            const generateBeats = async (actIdx, sceneIdx, currentStory = story, isAutopilot = false, directiveInstruction = "") => {
                const storyToUse = currentStory || story;
                const sId = `${actIdx}-${sceneIdx}`;
                const sceneData = storyToUse.scenes[actIdx][sceneIdx];
                const activeThreads = sceneData.active_thread_ids || sceneData.thread_ids || [];

                setLoading(true);

                try {
                    const activeThreadsData = storyToUse.threads.filter(t => activeThreads.includes(t.id));

                    // RAG context
                    const query = `Scene: ${sceneData.title}. Location: ${sceneData.location}. Characters: ${sceneData.cast_names.join(", ")}. Threads: ${activeThreadsData.map(t => t.name).join(", ")}`;
                    const ragLoreDocs = await retrieveContext(query, 0.65, (meta) => {
                        return !meta.valid_from_act || meta.valid_from_act <= (actIdx + 1);
                    });
                    const ragContext = ragLoreDocs.length > 0
                        ? ragLoreDocs.map(d => `- [${d.metadata.topic}]: ${d.text}`).join('\n')
                        : `World Bible: ${storyToUse.status_quo}`;

                    // Active Character profiles (First person interviews)
                    const activeCast = storyToUse.cast.filter(c => sceneData.cast_names?.includes(c.name));
                    
                    // Relationships
                    const relStrings = [];
                    activeCast.forEach(c => {
                        activeCast.forEach(other => {
                            if (c.name === other.name) return;
                            const key = `${c.name}->${other.name}`;
                            const rel = storyToUse.relationships?.[key];
                            if (rel && rel.current) {
                                relStrings.push(`- **${c.name}** toward **${other.name}**: ${rel.current}`);
                            }
                        });
                    });
                    const currentRelationshipsContext = relStrings.length > 0 ? relStrings.join('\n') : "No relationship history established.";

                    // Run Edit Router for Beats (Tier 4.1 & 4.2)
                    const beatResult = await runAgentWithEscalation({
                        tierName: "Beat Agent",
                        isAutopilot,
                        generatorPromptFn: () => `
<scene_title>${sceneData.title}</scene_title>
<scene_objective>${sceneData.objective}</scene_objective>
<scene_value_shift>
  <start_valence>${sceneData.start_valence}</start_valence>
  <end_valence>${sceneData.end_valence}</end_valence>
</scene_value_shift>
<scene_description>
${sceneData.description}
</scene_description>
<dominant_narrative_mode>${sceneData.dominant_narrative_mode || "BASELINE_NEUTRAL"}</dominant_narrative_mode>

<characters_present_profiles>
${activeCast.map(c => `<character_profile>
  <name>${c.name}</name>
  <role>${c.role}</role>
  <interview_psychology>
${c.details?.deep_profile || 'No profile available.'}
  </interview_psychology>
</character_profile>`).join('\n')}
</characters_present_profiles>

<relationships_present>
${currentRelationshipsContext}
</relationships_present>

<inventory>
${JSON.stringify(storyToUse.continuity_ledger)}
</inventory>

<world_lore_context>
${ragContext}
</world_lore_context>

<available_narrative_modes_for_override>
${allNarrativeModesXml}
</available_narrative_modes_for_override>
${directiveInstruction ? `
<directive_requirement>
You MUST adapt the beat choreography to address this specific instruction:
"${directiveInstruction}"
</directive_requirement>
` : ""}
`,
                        systemPrompt: PROMPTS.beatAgent,
                        reviewerSystemPrompt: PROMPTS.beatReview,
                        reviewerPromptFn: (genOutput) => `
<scene_objective>
${sceneData.objective}
</scene_objective>
<scene_value_shift>
${sceneData.start_valence} to ${sceneData.end_valence}
</scene_value_shift>
<generated_beat_choreography>
${genOutput}
</generated_beat_choreography>
`,
                        parserFn: (text) => {
                            let beatBlocks = extractAllTags(text, 'beat_choreography');
                            if (beatBlocks.length === 0) {
                                beatBlocks = extractAllTags(text, 'beat');
                            }
                            const beats = beatBlocks.map(extractBeat);
                            // Renumber beats sequentially
                            beats.forEach((b, i) => { b.number = i + 1; });
                            return { beats };
                        },
                        modelSize: "small", // Small is recommended for Beat Agent
                        spawningContext: `Act ${actIdx + 1} Scene ${sceneIdx + 1} Beat choreography`,
                        parentTierFailFn: async (reasons) => {
                            // Cascading deletion callback
                            setStory(prev => {
                                const nextStory = { ...prev };
                                const sId = `${actIdx}-${sceneIdx}`;
                                delete nextStory.beats[sId];
                                if (nextStory.scenes[actIdx]) {
                                    nextStory.scenes[actIdx].splice(sceneIdx, 1);
                                }
                                return nextStory;
                            });
                            setFeedbackLedger(prev => ({
                                ...prev,
                                "Scene Agent": reasons
                            }));
                        },
                        activeActNum: actIdx + 1,
                        activeSceneNum: sceneIdx + 1
                    });

                    const spawnedBriefs = beatResult.spawnedBriefs || [];
                    if (spawnedBriefs.length > 0) {
                        const actScenes = [...(storyToUse.scenes[actIdx] || [])];
                        const sceneDataCopy = { ...sceneData };
                        sceneDataCopy.cast_ids = [...(sceneDataCopy.cast_ids || [])];
                        sceneDataCopy.cast_names = [...(sceneDataCopy.cast_names || [])];
                        
                        spawnedBriefs.forEach(brief => {
                            if (!sceneDataCopy.cast_ids.includes(brief.id)) sceneDataCopy.cast_ids.push(brief.id);
                            if (!sceneDataCopy.cast_names.includes(brief.name)) sceneDataCopy.cast_names.push(brief.name);
                        });
                        
                        actScenes[sceneIdx] = sceneDataCopy;
                        storyToUse.scenes = {
                            ...storyToUse.scenes,
                            [actIdx]: actScenes
                        };
                    }

                    const nextStory = {
                        ...storyToUse,
                        beats: { ...storyToUse.beats, [sId]: beatResult.parsedData.beats },
                        cast: story.cast,
                        prose: Object.keys(storyToUse.prose).reduce((acc, key) => {
                            if (!key.startsWith(`${sId}-`)) acc[key] = storyToUse.prose[key];
                            return acc;
                        }, {})
                    };

                    setStory(nextStory);
                    setSelectedScene(sceneIdx);
                    showToast("Beats generated successfully!");
                    return nextStory;
                } catch (e) {
                    console.error("Beat generation failed:", e);
                    if (isAutopilot) {
                        showToast(`Cascading deletion: Beat generation failed. Rolling back to Scene Agent...`, 'warning');
                        return new Promise((resolve) => {
                            setTimeout(() => {
                                const clearedStory = { ...currentStory };
                                const sId = `${actIdx}-${sceneIdx}`;
                                delete clearedStory.beats[sId];
                                if (clearedStory.scenes[actIdx]) {
                                    clearedStory.scenes[actIdx] = clearedStory.scenes[actIdx].filter((_, idx) => idx !== sceneIdx);
                                }
                                resolve(clearedStory);
                            }, 100);
                        });
                    } else {
                        alert("Beat generation failed: " + e.message);
                        throw e;
                    }
                } finally {
                    if (!isAutopilot) setLoading(false);
                }
            };

            const writeProse = async (actIdx, sceneIdx, beatIdx, currentStory = story, isAutopilot = false, directiveInstruction = "") => {
                const storyToUse = currentStory || story;
                setLoading(true);
                const sId = `${actIdx}-${sceneIdx}`;
                const bId = `${sId}-${beatIdx}`;
                const beat = storyToUse.beats[sId]?.[beatIdx];
                if (!beat) throw new Error(`Beat not found at index ${beatIdx} for ${sId}`);
                const scene = storyToUse.scenes[actIdx][sceneIdx];

                // Ensure Character Profiles (Tier 0.2)
                let castWasUpdated = false;
                const mutableCast = [...storyToUse.cast];
                const sceneCharacters = scene.cast_names || [];

                for (const name of sceneCharacters) {
                    const charOriginal = storyToUse.cast.find(c => c.name === name);
                    if (charOriginal && !charOriginal.details?.deep_profile) {
                        await getCharacterDetails(name, mutableCast);
                        castWasUpdated = true;
                    }
                }

                if (castWasUpdated) {
                    setStory(prev => ({ ...prev, cast: mutableCast }));
                    story.cast = mutableCast;
                }

                const prevBeatIdx = beatIdx - 1;
                const prevText = prevBeatIdx >= 0 && storyToUse.prose[`${sId}-${prevBeatIdx}`]?.final
                    ? storyToUse.prose[`${sId}-${prevBeatIdx}`].final
                    : "[Scene Start]";

                // Full text context of scene so far
                let fullSceneText = "";
                for (let i = 0; i < beatIdx; i++) {
                    if (storyToUse.prose[`${sId}-${i}`]?.final) {
                        fullSceneText += storyToUse.prose[`${sId}-${i}`].final + "\n\n";
                    }
                }
                if (!fullSceneText) fullSceneText = "[Start of Scene]";

                const activeCast = mutableCast.filter(c => scene.cast_names?.includes(c.name));
                const relStrings = [];
                activeCast.forEach(c => {
                    activeCast.forEach(other => {
                        if (c.name === other.name) return;
                        const key = `${c.name}->${other.name}`;
                        const rel = storyToUse.relationships?.[key];
                        if (rel && rel.current) {
                            relStrings.push(`- **${c.name}** toward **${other.name}**: ${rel.current}`);
                        }
                    });
                });
                const currentRelationshipsContext = relStrings.length > 0 ? relStrings.join('\n') : "No relationship history established.";

                // RAG context for beat
                setLoadingStep("Retrieving Context (RAG)...");
                const beatQuery = `Beat Action: ${beat.description}. Scene Context: ${scene.description}. Mood: ${beat.emotional_shift}`;
                const ragLoreDocs = await retrieveContext(beatQuery, 0.65, (meta) => {
                    return !meta.valid_from_act || meta.valid_from_act <= (actIdx + 1);
                });
                const loreContext = ragLoreDocs.length > 0
                    ? ragLoreDocs.map(d => `### ${d.metadata.topic}\n${d.text}`).join('\n\n')
                    : "No specific relevant world lore found for this moment.";

                try {
                    // Determine active lens mode ID
                    const activeModeId = beat.mode_override || scene.dominant_narrative_mode || "BASELINE_NEUTRAL";
                    const narrativeModeObj = allNarrativeModes[activeModeId] || allNarrativeModes.BASELINE_NEUTRAL;
                    const injectionPrompt = narrativeModeObj.prompt || "";
                    
                    // Append the Injection Prompt to the Writing Agent system prompt
                    const finalWritingSystemPrompt = injectionPrompt 
                        ? `${PROMPTS.writingAgent}\n\n${injectionPrompt}` 
                        : PROMPTS.writingAgent;

                    // Run Edit Router for Writing (Tier 5.1 & 5.2)
                    const proseResult = await runAgentWithEscalation({
                        tierName: "Writing Agent",
                        isAutopilot,
                        generatorPromptFn: () => `
<scene_description>
${scene.description}
</scene_description>
<active_characters_profiles>
${activeCast.map(c => `<character_profile>
  <name>${c.name}</name>
  <interview_psychology>
${c.details?.deep_profile}
  </interview_psychology>
</character_profile>`).join('\n')}
</active_characters_profiles>
<current_relationships>
${currentRelationshipsContext}
</current_relationships>
<lore_subtext_context>
${loreContext}
</lore_subtext_context>
<reference_style>
<genre>${storyToUse.style?.genre}</genre>
<style_guide>${storyToUse.style?.writing_guide}</style_guide>
<tone>${storyToUse.style?.mood}</tone>
</reference_style>

<previous_prose_context>
${prevText}
</previous_prose_context>

<full_scene_history>
${fullSceneText}
</full_scene_history>

<current_beat_choreography>
<beat_choreography>
<scene_id>${beat.scene_id}</scene_id>
<beat_id>${beat.id || `${sId}.${beatIdx}`}</beat_id>
<beat_description>
${beat.description}
</beat_description>
<char_A_tactic>${beat.tactic || ""}</char_A_tactic>
<char_A_action>${beat.action || ""}</char_A_action>
<char_B_reaction>${beat.reaction || ""}</char_B_reaction>
<power_shift>${beat.power_shift || ""}</power_shift>
</beat_choreography>
</current_beat_choreography>
${directiveInstruction ? `
<directive_rewrite_mandate>
You MUST rewrite this beat's prose to satisfy the following instruction:
"${directiveInstruction}"
</directive_rewrite_mandate>
` : ""}
`,
                        systemPrompt: finalWritingSystemPrompt,
                        reviewerSystemPrompt: PROMPTS.writingReview,
                        reviewerPromptFn: (genOutput) => `
<current_beat_choreography>
${beat.description}
</current_beat_choreography>
<generated_prose>
${genOutput}
</generated_prose>
`,
                        parserFn: (text) => {
                            const prose = extractTag(text, 'prose_text') || text;
                            return { prose };
                        },
                        modelSize: "small", // Start with small model, escalates to large on 3rd try
                        spawningContext: `Act ${actIdx + 1} Scene ${sceneIdx + 1} Beat ${beatIdx + 1} Prose Writing`,
                        parentTierFailFn: async (reasons) => {
                            // Cascading deletion callback
                            setStory(prev => {
                                const nextStory = { ...prev };
                                const sId = `${actIdx}-${sceneIdx}`;
                                const bId = `${sId}-${beatIdx}`;
                                delete nextStory.prose[bId];
                                delete nextStory.beats[sId];
                                return nextStory;
                            });
                            setFeedbackLedger(prev => ({
                                ...prev,
                                "Beat Agent": reasons
                            }));
                        },
                        activeActNum: actIdx + 1,
                        activeSceneNum: sceneIdx + 1
                    });

                    let finalProseText = proseResult.parsedData.prose;

                    if (finalProseText) {
                        const lines = finalProseText.split('\n');
                        let startIdx = 0;
                        while (startIdx < lines.length) {
                            const trimmedLine = lines[startIdx].trim();
                            if (trimmedLine.startsWith('#') || trimmedLine === '') {
                                startIdx++;
                            } else {
                                break;
                            }
                        }
                        finalProseText = lines.slice(startIdx).join('\n').trim();
                    }

                    let nextStory = { 
                        ...storyToUse, 
                        prose: { 
                            ...storyToUse.prose, 
                            [bId]: { 
                                draft: finalProseText, 
                                final: finalProseText,
                                failed: proseResult.failed || false,
                                critique: proseResult.critique || ""
                            } 
                        } 
                    };
                    if (castWasUpdated) nextStory.cast = mutableCast;

                    // Run Archivist at end of scene
                    const isLastBeat = beatIdx === (storyToUse.beats[sId].length - 1);
                    if (isLastBeat) {
                        setLoadingStep("Final Agent: Archiving scene updates...");
                        const currentLoreList = nextStory.lore.map(l => l.topic).join(', ');
                        const completedSceneText = fullSceneText + "\n\n" + finalProseText;
                        
                        const archivistPrompt = `
<scene_text>
${completedSceneText}
</scene_text>
<cast_list>
${activeCast.map(c => c.name).join(', ')}
</cast_list>
<current_lore_topics>
${currentLoreList}
</current_lore_topics>
`;
                        const archivistSystemPrompt = PROMPTS.archivist;
                        try {
                            const updates = await callAI(archivistPrompt, archivistSystemPrompt, true, "Archivist", "large");
                            if (updates) {
                                handleWorldUpdates(updates, actIdx + 1, scene.number);
                            }
                        } catch (archError) {
                            console.warn("Archivist step failed or skipped:", archError);
                        }
                    }

                    setStory(nextStory);
                    showToast("Prose written successfully!");
                    return nextStory;
                } catch (e) {
                    console.error("Prose writing failed:", e);
                    if (isAutopilot) {
                        showToast(`Cascading deletion: Prose writing failed. Rolling back to Beat Agent...`, 'warning');
                        return new Promise((resolve) => {
                            setTimeout(() => {
                                const clearedStory = { ...currentStory };
                                const sId = `${actIdx}-${sceneIdx}`;
                                const bId = `${sId}-${beatIdx}`;
                                delete clearedStory.prose[bId];
                                delete clearedStory.beats[sId];
                                resolve(clearedStory);
                            }, 100);
                        });
                    } else {
                        alert("Prose writing failed: " + e.message);
                        throw e;
                    }
                } finally {
                    if (!isAutopilot) setLoading(false);
                }
            };

            const copyFullScene = () => {
                if (selectedAct === null || selectedScene === null || !story.scenes || !story.scenes[selectedAct] || !story.scenes[selectedAct][selectedScene]) return;
                const scene = story.scenes[selectedAct][selectedScene];
                const sId = `${selectedAct}-${selectedScene}`;
                const beats = story.beats[sId] || [];
                let text = `SCENE ${scene.number}: ${scene.title.toUpperCase()}\n\n`;
                beats.forEach((beat, idx) => {
                    const bId = `${sId}-${idx}`;
                    if (story.prose[bId]?.final) text += story.prose[bId].final + "\n\n";
                });
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-9999px";
                document.body.appendChild(textArea);
                textArea.select();
                try { document.execCommand('copy'); showToast("Copied to clipboard!"); } catch (err) { alert("Copy failed."); }
                document.body.removeChild(textArea);
            };

            const handleAutopilot = async () => {
                const conceptToUse = inputConcept;
                if (!conceptToUse) return;

                if (!window.confirm("AUTOPILOT MODE: This will generate a full story from your concept. Existing data may be overwritten. Continue?")) return;

                try {
                    // 1. Architect Story
                    const storyBible = await initStory(true);
                    setView('dashboard'); // Present progress

                    // 2. Weave Scenes for Act 1
                    // Note: Act index is 0
                    const scenesStory = await generateScenes(0, storyBible, true);
                    setView('structure'); // Present progress

                    // 3. Direct Beats for Act 1, Scene 1 (index 0)
                    // We only do the first scene automatically to start
                    const beatsStory = await generateBeats(0, 0, scenesStory, true);
                    setView('writer'); // Present progress

                    // 4. Write Prose for All Beats in Scene 1
                    const sId = "0-0";
                    let currentStory = beatsStory;
                    if (!currentStory.beats[sId] || currentStory.beats[sId].length === 0) throw new Error("No beats generated.");

                    let i = 0;
                    let beatsProcessed = 0;
                    while (currentStory.beats[sId] && i < currentStory.beats[sId].length) {
                        currentStory = await writeProse(0, 0, i, currentStory, true);
                        if (!currentStory.beats[sId]) {
                            setStory(currentStory);
                            throw new Error("Prose writing failed. Cascading deletion rolled back to Beat Agent.");
                        }

                        beatsProcessed++;
                        if (beatsProcessed % 3 === 0 && i < currentStory.beats[sId].length - 1) {
                            showToast("Cooling down AI (5s)...");
                            await new Promise(resolve => setTimeout(resolve, 5000));
                        }

                        i++;
                    }

                    showToast("Autopilot Complete: First Scene Written!");

                } catch (e) {
                    console.error(e);
                    alert("Autopilot Stopped: " + e.message);
                } finally {
                    setLoading(false);
                }
            };

            const runContinuousAutopilotStep = async () => {
                if (!story.concept) {
                    showToast("Please enter a story concept first!");
                    setContinuousAutopilot(false);
                    return;
                }

                let currentStory = story;

                // Check if story acts are initialized
                if (!currentStory.acts || currentStory.acts.length === 0) {
                    setLoadingStep("Autopilot: Initializing Story Bible...");
                    currentStory = await initStory(true);
                    if (!continuousAutopilotRef.current) return;
                    await new Promise(resolve => setTimeout(resolve, 2000));
                }

                // Iterate acts and find first chronological gap
                for (let actIdx = 0; actIdx < currentStory.acts.length; actIdx++) {
                    if (!continuousAutopilotRef.current) return;

                    const act = currentStory.acts[actIdx];
                    const scenes = currentStory.scenes[actIdx];

                    // Gap 1: Scenes are not wove for this Act
                    if (!scenes || scenes.length === 0) {
                        setView('structure');
                        setLoadingStep(`Autopilot: Weaving scenes for Act ${actIdx + 1}...`);
                        currentStory = await generateScenes(actIdx, currentStory, true);
                        if (!continuousAutopilotRef.current) {
                            setLoading(false);
                            return;
                        }
                        showToast(`Act ${actIdx + 1} scenes wove! Cooling down...`);
                        await new Promise(resolve => setTimeout(resolve, 3000));
                        setLoading(false);
                        return;
                    }

                    // Iterate scenes in this act
                    for (let sceneIdx = 0; sceneIdx < scenes.length; sceneIdx++) {
                        if (!continuousAutopilotRef.current) return;

                        const scene = scenes[sceneIdx];
                        const sId = `${actIdx}-${sceneIdx}`;
                        const beats = currentStory.beats[sId];

                        // Gap 2: Beats are not wove for this scene
                        if (!beats || beats.length === 0) {
                            setSelectedAct(actIdx);
                            setSelectedScene(sceneIdx);
                            setView('writer');
                            setLoadingStep(`Autopilot: Generating beats for Act ${actIdx + 1}, Scene ${sceneIdx + 1}...`);
                            currentStory = await generateBeats(actIdx, sceneIdx, currentStory, true);
                            if (!continuousAutopilotRef.current) {
                                setLoading(false);
                                return;
                            }
                            showToast(`Beats generated for Scene ${sceneIdx + 1}! Cooling down...`);
                            await new Promise(resolve => setTimeout(resolve, 3000));
                            setLoading(false);
                            return;
                        }

                        // Gap 3: Prose is missing for any beat in this scene
                        let firstMissingBeat = -1;
                        for (let beatIdx = 0; beatIdx < beats.length; beatIdx++) {
                            const bId = `${sId}-${beatIdx}`;
                            const prose = currentStory.prose[bId];
                            if (!prose || !prose.final) {
                                firstMissingBeat = beatIdx;
                                break;
                            }
                        }

                        if (firstMissingBeat !== -1) {
                            setSelectedAct(actIdx);
                            setSelectedScene(sceneIdx);
                            setView('writer');
                            
                            let beatsProcessed = 0;
                            let i = firstMissingBeat;
                            // Dynamically loop based on the live, updated story beat array length
                            while (currentStory.beats[sId] && i < currentStory.beats[sId].length) {
                                if (!continuousAutopilotRef.current) {
                                    setLoading(false);
                                    return;
                                }
                                
                                setLoadingStep(`Autopilot: Drafting prose for Act ${actIdx + 1}, Scene ${sceneIdx + 1}, Beat ${i + 1} of ${currentStory.beats[sId].length}...`);
                                currentStory = await writeProse(actIdx, sceneIdx, i, currentStory, true);
                                if (!currentStory.beats[sId]) {
                                    setStory(currentStory);
                                    setLoading(false);
                                    return;
                                }
                                
                                beatsProcessed++;
                                // Cooldown AI every 3 beats to respect rate limits
                                if (beatsProcessed % 3 === 0 && i < currentStory.beats[sId].length - 1) {
                                    showToast("Cooling down AI (5s)...");
                                    await new Promise(resolve => setTimeout(resolve, 5000));
                                }
                                i++;
                            }
                            
                            // Take a small break after finishing a full scene before starting next scene/act
                            if (continuousAutopilotRef.current) {
                                showToast(`Scene ${sceneIdx + 1} completed! Taking a short breath...`);
                                await new Promise(resolve => setTimeout(resolve, 3000));
                            }
                            setLoading(false);
                            return;
                        }
                    }
                }

                // Done with all acts, scenes, and beats
                setContinuousAutopilot(false);
                showToast("✨ Continuous Autopilot Complete! The entire book has been wove and written!");
            };

                let active = true;

                    if (continuousAutopilot && !loading && active) {
                        try {
                            await runContinuousAutopilotStep();

                                                         className="flex items-center gap-3 w-full bg-slate-900 border border-slate-800 hover:border-indigo-500/50 hover:bg-slate-850/50 rounded p-2 text-left transition-all group/btn"
                                                     >
                                                         <div className="w-8 h-8 rounded bg-slate-950 border border-slate-800 flex items-center justify-center text-indigo-400 shrink-0 group-hover/btn:text-indigo-300 group-hover/btn:border-indigo-500/30 transition-colors">
                                                             <Icon name={newModeIcon} className="w-4 h-4" />
                                                         </div>
                                                         <div className="flex-1 min-w-0">
                                                             <div className="text-xs font-semibold text-slate-200 truncate">
                                                                 {AVAILABLE_ICONS.find(ico => ico.value === newModeIcon)?.label || newModeIcon}
                                                             </div>
                                                             <div className="text-[10px] text-slate-500 mt-0.5">Click to choose from the icon library</div>
                                                         </div>
                                                         <ChevronDown size={14} className="text-slate-500 group-hover/btn:text-slate-300 transition-colors" />
                                                     </button>
                                                 </div>
                                                <div>
                                                    <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Prompt Injection Instructions (for Writing Agent)</label>
                                                    <textarea
                                                        value={newModePrompt}
                                                        onChange={(e) => setNewModePrompt(e.target.value)}
                                                        className="w-full h-20 bg-slate-900 border border-slate-800 rounded px-2.5 py-1.5 text-xs text-slate-300 focus:border-indigo-500 outline-none transition-colors resize-none"
                                                        placeholder="e.g. CURRENT LENS: DARK CYBERPUNK. Point the camera at mechanical hums, oily rain, and synthetic implants. Sentences should feel metallic..."
                                                    />
                                                </div>
                                                <button
                                                    onClick={handleAddCustomMode}
                                                    className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 rounded text-xs transition-colors flex justify-center items-center gap-1 active:scale-95"
                                                >
                                                    <Plus size={14} /> Add Narrative Mode
                                                </button>
                                            </div>
                                        </div>

                                        {/* Danger Zone */}
                                        <div className="pt-6 border-t border-red-950/40">
                                            <label className="block text-xs font-bold text-red-400 uppercase mb-2">Danger Zone</label>
                                            <div className="bg-red-950/10 border border-red-900/40 rounded-lg p-4 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                                <div>
                                                    <h4 className="text-sm font-bold text-red-300">Delete Story Details</h4>
                                                    <p className="text-xs text-slate-400 mt-1">Permanently erase the current story configuration, characters, outline, and generated prose from local storage. This action is irreversible.</p>
                                                </div>
                                                <button
                                                    onClick={handleDeleteStory}
                                                    className="px-4 py-2 bg-red-950/60 hover:bg-red-900 border border-red-700/40 text-red-200 hover:text-white rounded-lg text-xs font-bold transition-all shadow-md active:scale-95 flex items-center gap-1.5 whitespace-nowrap self-start sm:self-auto"
                                                >
                                                    <Trash2 size={14} />
                                                    Delete Story
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>
                        {/* TOAST NOTIFICATION */}
                        {toast && (
                            <div className={`fixed bottom-6 right-6 z-50 px-6 py-4 rounded-xl shadow-2xl border flex items-center gap-3 animate-fade-in ${toast.type === 'error' ? 'bg-red-900/90 border-red-500 text-red-100' : 'bg-emerald-900/90 border-emerald-500 text-emerald-100'}`}>
                                {toast.type === 'error' ? <X size={20} /> : <Sparkles size={20} />}
                                <div>
                                    <h4 className="font-bold text-sm">{toast.type === 'error' ? 'Error' : 'Success'}</h4>
                                    <p className="text-xs opacity-90">{toast.message}</p>
                                </div>
                            </div>
                        )}
                    </div >
                    {/* GLOBAL EDIT MODAL */}
                    <EditModal
                        isOpen={editingState.isOpen}
                        title={editingState.title}
                        value={editingState.value}
                        onConfirm={editingState.onConfirm}
                        onCancel={() => setEditingState(prev => ({ ...prev, isOpen: false }))}
                    />
                    {/* INTERVENTION MODAL */}
                    <InterventionModal
                        isOpen={interventionState.isOpen}
                        tierName={interventionState.tierName}
                        deviationReasons={interventionState.deviationReasons}
                        rawOutput={interventionState.rawOutput}
                        onResolve={interventionState.onResolve}
                        onCancel={() => {
                            if (interventionState.onResolve) interventionState.onResolve('abort');
                            setInterventionState(prev => ({ ...prev, isOpen: false }));
                        }}
                    />
                    {/* CRITIQUE MODAL */}
                    <CritiqueModal
                        isOpen={critiqueState.isOpen}
                        beatNumber={critiqueState.beatNumber}
                        critique={critiqueState.critique}
                        onClose={() => setCritiqueState(prev => ({ ...prev, isOpen: false }))}
                    />
                    {/* ICON PICKER MODAL */}
                    {isIconPickerOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 backdrop-blur-sm p-4 animate-fade-in">
                            <div className="bg-slate-900 border border-slate-800 w-full max-w-sm rounded-xl shadow-2xl flex flex-col overflow-hidden">
                                <div className="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-850/50">
                                    <h3 className="text-sm font-bold text-slate-100 flex items-center gap-2">
                                        <Sparkles size={16} className="text-indigo-400" />
                                        Select Mode Icon
                                    </h3>
                                    <button onClick={() => setIsIconPickerOpen(false)} className="text-slate-400 hover:text-white transition-colors">
                                        <X size={18} />
                                    </button>
                                </div>
                                <div className="p-6 max-h-[60vh] overflow-y-auto custom-scrollbar">
                                    <div className="grid grid-cols-9 gap-2">
                                        {AVAILABLE_ICONS.map((ico) => {
                                            const isSelected = newModeIcon === ico.value;
                                            return (
                                                <button
                                                    key={ico.value}
                                                    type="button"
                                                    onClick={() => {
                                                        setNewModeIcon(ico.value);
                                                        setIsIconPickerOpen(false);
                                                    }}
                                                    title={ico.label}
                                                    className={`w-8 h-8 rounded flex items-center justify-center transition-all ${
                                                        isSelected
                                                            ? 'bg-indigo-600 text-white scale-110 shadow-lg shadow-indigo-900/50 border border-indigo-400'
                                                            : 'bg-slate-950 hover:bg-slate-800 text-slate-400 hover:text-indigo-300 hover:scale-105 border border-slate-850'
                                                    }`}
                                                >
                                                    <Icon name={ico.value} className="w-4 h-4" />
                                                </button>
                                            );
                                        })}
                                    </div>
                                    <div className="mt-4 text-center">
                                        <p className="text-[10px] text-slate-500 font-medium">
                                            Currently selected: <span className="text-indigo-400 font-bold">{AVAILABLE_ICONS.find(ico => ico.value === newModeIcon)?.label || newModeIcon}</span>
                                        </p>
                                    </div>
                                </div>
                                <div className="p-3 border-t border-slate-800 bg-slate-850/50 flex justify-end">
                                    <button
                                        onClick={() => setIsIconPickerOpen(false)}
                                        className="px-4 py-1.5 rounded bg-slate-800 hover:bg-slate-700 text-white text-xs font-bold transition-colors"
                                    >
                                        Cancel
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div >
            );
        }

        const container = document.getElementById('root');
        if (!window.reactRoot) {
            window.reactRoot = ReactDOM.createRoot(container);
        }
        window.reactRoot.render(<EllipsisProsef />);
    </script>
</body>

</html>
