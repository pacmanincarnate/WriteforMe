                setDirectiveExecutionLogs([]);
                
                let currentStory = { ...story };
                
                const logMessage = (text, status = 'pending') => {
                    setDirectiveExecutionLogs(prev => {
                        if (prev.length > 0 && prev[prev.length - 1].status === 'running' && (status === 'success' || status === 'error')) {
                            const next = [...prev];
                            next[next.length - 1] = { ...next[next.length - 1], status, text: text || next[next.length - 1].text };
                            return next;
                        }
                        return [...prev, { id: Date.now() + Math.random(), text, status }];
                    });
                };
                
                try {
                    for (let i = 0; i < planActions.length; i++) {
                        const action = planActions[i];
                        const actionNum = i + 1;
                        const totalActions = planActions.length;
                        
                        logMessage(`[Action ${actionNum}/${totalActions}] Running: ${action.description}`, 'running');
                        
                        if (action.action_type === 'MODIFY_SCENE') {
                            const actIdx = action.target_act_idx;
                            const sceneIdx = action.target_scene_idx !== null && action.target_scene_idx !== undefined ? action.target_scene_idx : 0;
                            
                            const actScenes = [...(currentStory.scenes[actIdx] || [])];
                            if (actScenes[sceneIdx]) {
                                const scene = { ...actScenes[sceneIdx] };
                                if (action.details.title) scene.title = action.details.title;
                                if (action.details.objective) scene.objective = action.details.objective;
                                if (action.details.description) scene.description = action.details.description;
                                
                                const modeToUse = action.details.dominant_narrative_mode || action.details.mode_override;
                                if (modeToUse) scene.dominant_narrative_mode = modeToUse;
                                
                                actScenes[sceneIdx] = scene;
                                currentStory = {
                                    ...currentStory,
                                    scenes: { ...currentStory.scenes, [actIdx]: actScenes }
                                };
                                setStory(currentStory);
                                logMessage(`[Action ${actionNum}/${totalActions}] Success: Modified Scene "${scene.title}" metadata.`, 'success');
                            } else {
                                throw new Error(`Scene at index ${sceneIdx} in Act ${actIdx + 1} not found.`);
                            }
                        } else if (action.action_type === 'ADD_SCENE') {
                            const actIdx = action.target_act_idx;
                            const actScenes = [...(currentStory.scenes[actIdx] || [])];
                            const insertIdx = action.details.insert_at_idx !== undefined ? parseInt(action.details.insert_at_idx) : actScenes.length;
                            
                            // Shift subsequent keys in beats and prose
                            const nextBeats = { ...currentStory.beats };
                            const nextProse = { ...currentStory.prose };
                            const numScenes = actScenes.length;
                            
                            for (let idx = numScenes - 1; idx >= insertIdx; idx--) {
                                const oldKey = `${actIdx}-${idx}`;
                                const newKey = `${actIdx}-${idx + 1}`;
                                
                                if (nextBeats[oldKey]) {
                                    nextBeats[newKey] = nextBeats[oldKey];
                                    delete nextBeats[oldKey];
                                }
                                
                                Object.keys(nextProse).forEach(pKey => {
                                    if (pKey.startsWith(`${oldKey}-`)) {
                                        const beatPart = pKey.substring(oldKey.length + 1);
                                        const newPKey = `${newKey}-${beatPart}`;
                                        nextProse[newPKey] = nextProse[pKey];
                                        delete nextProse[pKey];
                                    }
                                });
                            }
                            
                            const newSceneNum = `${actIdx + 1}.${insertIdx + 1}`;
                            const castIds = (action.details.cast_names || "").split(",").map(name => {
                                const trimmed = name.trim();
                                if (!trimmed) return null;
                                const existing = currentStory.cast.find(c => c.name.toLowerCase() === trimmed.toLowerCase());
                                return existing ? existing.id : trimmed;
                            }).filter(Boolean);
                            const castNames = castIds.map(id => {
                                const char = currentStory.cast.find(c => c.id === id);
                                return char ? char.name : id;
                            });
                            
                            const newScene = {
                                id: newSceneNum,
                                number: newSceneNum,
                                title: action.details.title || "New Scene",
                                objective: action.details.objective || "",
                                description: action.details.description || "",
                                dominant_narrative_mode: action.details.dominant_narrative_mode || action.details.mode_override || "BASELINE_NEUTRAL",
                                cast_ids: castIds,
                                cast_names: castNames,
                                thread_ids: ["T1"],
                                value_shift: { start_state: "NEUTRAL", end_state: "NEUTRAL" },
                                relationship_shifts: [],
                                state_changes_introduced: []
                            };
                            
                            actScenes.splice(insertIdx, 0, newScene);
                            
                            // Re-index all scenes in this act
                            actScenes.forEach((s, idx) => {
                                s.id = `${actIdx + 1}.${idx + 1}`;
                                s.number = s.id;
                            });
                            
                            currentStory = {
                                ...currentStory,
                                scenes: { ...currentStory.scenes, [actIdx]: actScenes },
                                beats: nextBeats,
                                prose: nextProse
                            };
                            setStory(currentStory);
                            logMessage(`[Action ${actionNum}/${totalActions}] Success: Added new Scene "${newScene.title}" at index ${insertIdx}.`, 'success');
                        } else if (action.action_type === 'REGENERATE_BEATS') {
                            const actIdx = action.target_act_idx;
                            const sceneIdx = action.target_scene_idx !== null && action.target_scene_idx !== undefined ? action.target_scene_idx : 0;
                            
                            logMessage(`[Action ${actionNum}/${totalActions}] Running Beat Agent for Act ${actIdx + 1} Scene ${sceneIdx + 1}...`, 'running');
                            
                            // Apply mode override if specified in details
                            const modeToUse = action.details.mode_override || action.details.dominant_narrative_mode;
                            if (modeToUse) {
                                const actScenes = [...(currentStory.scenes[actIdx] || [])];
                                if (actScenes[sceneIdx]) {
                                    actScenes[sceneIdx] = {
                                        ...actScenes[sceneIdx],
                                        dominant_narrative_mode: modeToUse
                                    };
                                    currentStory = {
                                        ...currentStory,
                                        scenes: { ...currentStory.scenes, [actIdx]: actScenes }
                                    };
                                    setStory(currentStory);
                                }
                            }
                            
                            currentStory = await generateBeats(
                                actIdx,
                                sceneIdx,
                                currentStory,
                                true, // Autopilot
                                action.details.instructions
                            );
                            logMessage(`[Action ${actionNum}/${totalActions}] Success: Regenerated beats for Scene ${sceneIdx + 1}.`, 'success');
                        } else if (action.action_type === 'REWRITE_PROSE') {
                            const actIdx = action.target_act_idx;
                            const sceneIdx = action.target_scene_idx !== null && action.target_scene_idx !== undefined ? action.target_scene_idx : 0;
                            const beatIdx = action.target_beat_idx !== null && action.target_beat_idx !== undefined ? action.target_beat_idx : 0;
                            
                            logMessage(`[Action ${actionNum}/${totalActions}] Running Writing Agent for Beat ${beatIdx + 1} in Scene ${sceneIdx + 1}...`, 'running');
                            
                            // Apply mode override if specified in details
                            const modeToUse = action.details.mode_override || action.details.dominant_narrative_mode;
                            if (modeToUse !== undefined) {
                                const sId = `${actIdx}-${sceneIdx}`;
                                const beats = [...(currentStory.beats[sId] || [])];
                                if (beats[beatIdx]) {
                                    beats[beatIdx] = {
                                        ...beats[beatIdx],
                                        mode_override: modeToUse === "" ? null : modeToUse
                                    };
                                    currentStory = {
                                        ...currentStory,
                                        beats: { ...currentStory.beats, [sId]: beats }
                                    };
                                    setStory(currentStory);
                                }
                            }
                            
                            currentStory = await writeProse(
                                actIdx,
                                sceneIdx,
                                beatIdx,
                                currentStory,
                                true, // Autopilot
                                action.details.instructions
                            );
                            logMessage(`[Action ${actionNum}/${totalActions}] Success: Rewrote prose for Beat ${beatIdx + 1}.`, 'success');
                        }
                        
                        setDirectiveProgress(Math.round(((i + 1) / totalActions) * 100));
                        
                        // Small cooling delay
                        await new Promise(resolve => setTimeout(resolve, 500));
                    }
                    
                    logMessage("All directive actions successfully applied!", 'success');
                    showToast("Directive plan applied successfully!", "success");
                } catch (err) {
                    console.error("Directive execution failed:", err);
                    logMessage(`Error applying action: ${err.message}`, 'error');
                    showToast("Error executing plan: " + err.message, "error");
                } finally {
                    setIsExecutingDirective(false);
                }
            };

            const runDirectivePlanner = async () => {
                if (!directiveInput.trim()) {
                    showToast("Please enter a directive instruction.", "warning");
                    return;
                }
                setIsPlanningDirective(true);
                setDirectivePlan(null);
                
                try {
                    // Build story structure overview for prompt context
                    const structureOverview = {
                        title: story.title,
                        concept: story.concept,
                        status_quo: story.status_quo,
                        themes: story.themes,
                        cast: story.cast.map(c => ({ id: c.id, name: c.name, role: c.role })),
                        acts: story.acts.map((act, actIdx) => ({
                            index: actIdx,
                            number: act.number,
                            title: act.title,
                            description: act.description,
                            scenes: (story.scenes[actIdx] || []).map((scene, sceneIdx) => {
                                const sId = `${actIdx}-${sceneIdx}`;
                                const beatsCount = (story.beats[sId] || []).length;
                                return {
                                    index: sceneIdx,
                                    number: scene.number,
                                    title: scene.title,
                                    objective: scene.objective,
                                    description: scene.description,
                                    dominant_narrative_mode: scene.dominant_narrative_mode,
                                    cast_names: scene.cast_names,
                                    beats_count: beatsCount
                                };
                            })
                        }))
                    };
                    
                    const prompt = `
<user_directive>
${directiveInput}
</user_directive>

<current_story_structure>
${JSON.stringify(structureOverview, null, 2)}
</current_story_structure>
`;
                    
                    const response = await callAI(prompt, PROMPTS.directivePlanner, false, "Directive Planner", "large");
                    const parsed = parseDirectivePlan(response);
                    
                    if (!parsed.evaluation && parsed.actions.length === 0) {
                        throw new Error("Failed to parse plan. Response did not contain expected XML tags.");
                    }
                    
                    setDirectivePlan(parsed);
                    showToast("Directive plan generated successfully!", "success");
                } catch (err) {
                    console.error("Directive planning failed:", err);
                    alert("Planning failed: " + err.message);
                } finally {
                    setIsPlanningDirective(false);
                }
            };

            const handleUpdateActionField = (actionIdx, field, value) => {
                setDirectivePlan(prev => {
                    if (!prev) return prev;
                    const updatedActions = [...prev.actions];
                    const action = { ...updatedActions[actionIdx] };
                    
                    if (field === 'description') {
                        action.description = value;
                    } else if (field === 'target_act_idx') {
                        action.target_act_idx = parseInt(value) || 0;
                        if (action.target_scene_idx !== null && action.target_scene_idx !== undefined) {
                            action.target_scene_idx = 0;
                        }
                        if (action.target_beat_idx !== null && action.target_beat_idx !== undefined) {
                            action.target_beat_idx = 0;
                        }
                    } else if (field === 'target_scene_idx') {
                        action.target_scene_idx = value === "" ? null : parseInt(value);
                        if (action.target_beat_idx !== null && action.target_beat_idx !== undefined) {
                            action.target_beat_idx = 0;
                        }
                    } else if (field === 'target_beat_idx') {
                        action.target_beat_idx = value === "" ? null : parseInt(value);
                    } else if (field === 'action_type') {
                        action.action_type = value;
                        if (value === 'MODIFY_SCENE' || value === 'REGENERATE_BEATS' || value === 'REWRITE_PROSE') {
                            if (action.target_scene_idx === null || action.target_scene_idx === undefined) {
                                action.target_scene_idx = 0;
                            }
                        } else {
                            action.target_scene_idx = null;
                        }
                        
                        if (value === 'REWRITE_PROSE') {
                            if (action.target_beat_idx === null || action.target_beat_idx === undefined) {
                                action.target_beat_idx = 0;
                            }
                        } else {
                            action.target_beat_idx = null;
                        }
                        
                        action.details = action.details || {};
                    } else {
                        action.details = { ...action.details };
                        if (field === 'description_detail') {
                            action.details.description = value;
                        } else {
                            action.details[field] = value;
                        }
                    }
                    
                    updatedActions[actionIdx] = action;
                    return { ...prev, actions: updatedActions };
                });
            };

            const runAgentWithEscalation = async ({
                tierName,
                generatorPromptFn,
                systemPrompt,
                reviewerSystemPrompt,
                reviewerPromptFn,
                parserFn,
                modelSize = "large",
                spawningContext = "",
                parentTierFailFn = null,
                activeActNum = 1,
                activeSceneNum = 1,
                isAutopilot = false
            }) => {
                let attempt = 1;
                let deviationReasons = [];
                let currentModelSize = modelSize;
                let lastGenOutput = "";
                let lastParsedData = null;
                let lastCritique = "";
                let spawnedBriefs = [];
                let rsiAttemptsCount = 0;

                const spawnNewCharacters = async (briefsList) => {
                    if (!briefsList || briefsList.length === 0) return;
                    
                    showToast(`Dynamic Character Interrupt triggered! Spawning ${briefsList.length} character(s).`, 'info');
                    let updatedCast = [...story.cast];
                    const newlySpawned = [];

                    for (const brief of briefsList) {
                        if (updatedCast.find(c => c.name.toLowerCase() === brief.name.toLowerCase())) {
                            continue;
                        }
                        setLoadingStep(`Interrupt: Developing character ${brief.name}...`);
                        const worldBibleContext = `
Status Quo: ${story.status_quo}
Themes: ${story.themes}
Lore: ${story.lore.map(l => `${l.topic}: ${l.detail}`).join('\n')}
`;
                        const interviewPrompt = `
<world_bible>${worldBibleContext}</world_bible>
<character_briefs>
<char_id>${brief.id}</char_id>
${brief.name}
<brief_role>${brief.role}</brief_role>
<core_flaw>${brief.core_flaw}</core_flaw>
<core_desire>${brief.core_desire}</core_desire>
</character_briefs>
<spawning_context>${spawningContext}</spawning_context>
`;
                        const interviewOutput = await callAI(interviewPrompt, PROMPTS.characterDevelopment, false, `Character Developer (${brief.name})`, "large");
                        const interview = extractTag(interviewOutput, 'first_person_interview') || interviewOutput;
                        
                        const newChar = {
                            id: brief.id,
                            name: brief.name,
                            role: brief.role,
                            voice_sample: interview.split('.')[0].substring(0, 100) + "...",
                            details: {
                                history: brief.core_flaw,
                                story_events: `Introduced dynamically in context: ${spawningContext}`,
                                goals: brief.core_desire,
                                deep_profile: interview
                            }
                        };
                        updatedCast.push(newChar);
                        newlySpawned.push(brief);
                        spawnedBriefs.push(brief);
                    }

                    if (newlySpawned.length > 0) {
                        const actIdx = activeActNum - 1;
                        const sceneIdx = activeSceneNum - 1;
                        setStory(prev => {
                            const nextScenes = { ...prev.scenes };
                            if (nextScenes[actIdx] && nextScenes[actIdx][sceneIdx]) {
                                const scene = { ...nextScenes[actIdx][sceneIdx] };
                                scene.cast_ids = [...(scene.cast_ids || [])];
                                scene.cast_names = [...(scene.cast_names || [])];
                                for (const brief of newlySpawned) {
                                    if (!scene.cast_ids.includes(brief.id)) scene.cast_ids.push(brief.id);
                                    if (!scene.cast_names.includes(brief.name)) scene.cast_names.push(brief.name);
                                }
                                nextScenes[actIdx][sceneIdx] = scene;
                            }
                            return { ...prev, cast: updatedCast, scenes: nextScenes };
                        });
                        story.cast = updatedCast;
                    }
                };

                while (attempt <= 4) {
                    setLoadingStep(`Running ${tierName} (Attempt ${attempt}/4)...`);
                    
                    if (attempt === 3) {
                        currentModelSize = "large";
                        showToast(`Escalating ${tierName} to LARGE model...`, 'info');
                    }

                    let userPrompt = generatorPromptFn();
                    if (deviationReasons.length > 0) {
                        userPrompt += `\n\n=== REVISION REQUESTED FROM PREVIOUS ATTEMPT ===\nPlease address the following validation failures:\n${deviationReasons.map(r => `- ${r}`).join('\n')}\n`;
                    }

                    if (tierName === "Writing Agent" && attempt > 1 && lastGenOutput) {
                        const failedProse = extractTag(lastGenOutput, 'prose_text') || lastGenOutput;
                        userPrompt += `\n=== FAILED PROSE FROM PREVIOUS ATTEMPT ===\n${failedProse}\n`;
                        if (lastCritique) {
                            userPrompt += `\n=== REVIEWER CRITIQUE ===\n${lastCritique}\n`;
                        }
                    }

                    // Append parent feedback from feedbackLedger
                    const parentFeedback = feedbackLedger[tierName];
                    if (parentFeedback && parentFeedback.length > 0) {
                        userPrompt += `\n\n=== REVISIONS REQUIRED FROM DOWNSTREAM FAILURE ===\nYour previous output caused downstream generation to fail. Please adjust your generation to resolve the following issues:\n${parentFeedback.map(r => `- ${r}`).join('\n')}\n`;
                    }

                    const genOutput = await callAI(userPrompt, systemPrompt, false, `${tierName} Generator`, currentModelSize);
                    lastGenOutput = genOutput;

                    let parsedData;
                    try {
                        parsedData = parserFn(genOutput);
                        if (!parsedData) throw new Error("Parser returned null output.");
                        lastParsedData = parsedData;
                    } catch (parseError) {
                        console.error(`XML Parser failed on ${tierName}:`, parseError);
                        attempt++;
                        deviationReasons = [`Failed to generate valid XML tags structure. Error: ${parseError.message}. Make sure all required XML tags are opened and closed correctly.`];
                        continue;
                    }

                    let briefs = [];
                    if (genOutput.includes("<new_character_briefs>")) {
                        briefs = extractAllTags(genOutput, 'new_character_briefs').map(extractCharacterBrief);
                    }
                    await spawnNewCharacters(briefs);

                    setLoadingStep(`Reviewing ${tierName} output...`);
                    const reviewPrompt = reviewerPromptFn(genOutput);
                    let activeReviewerPrompt = reviewerSystemPrompt;
                    if (tierName === "Writing Agent" && attempt === 4) {
                        activeReviewerPrompt = PROMPTS.writingReviewRelaxed;
                        showToast("Using relaxed Writing Review Agent for final attempt...", "info");
                    }
                    const reviewOutput = await callAI(reviewPrompt, activeReviewerPrompt, false, `${tierName} Reviewer`, "small");

                    const reviewStatus = extractTag(reviewOutput, 'status') || "FAIL";
                    const reasons = extractAllTags(reviewOutput, 'reason');
                    const critique = extractTag(reviewOutput, 'critique_analysis');

                    let reviewBriefs = [];
                    if (reviewOutput.includes("<new_character_briefs>")) {
                        reviewBriefs = extractAllTags(reviewOutput, 'new_character_briefs').map(extractCharacterBrief);
                    }
                    await spawnNewCharacters(reviewBriefs);

                    if (reviewStatus.trim().toUpperCase() === 'PASS') {
                        showToast(`${tierName} passed review!`);
                        // Clear the feedback for this tier since it succeeded
                        setFeedbackLedger(prev => {
                            const next = { ...prev };
                            delete next[tierName];
                            return next;
                        });
                        triggerLoreExtraction(genOutput, activeActNum, activeSceneNum);
                        return { genOutput, parsedData, spawnedBriefs };
                    } else {
                        let rsiExecuted = false;
                        for (const reason of reasons) {
                            const rsiResult = await checkAndExecuteRSI(reason, story);
                            if (rsiResult) {
                                rsiExecuted = true;
                                break;
                            }
                        }
                        
                        if (rsiExecuted) {
                            rsiAttemptsCount++;
                            if (rsiAttemptsCount > 2) {
                                console.warn(`${tierName} review failed repeatedly with RSI. Escalating instead of looping.`);
                                attempt++;
                                deviationReasons = reasons.length > 0 ? reasons : ["Repeated validation failure after multiple RSI patches."];
                                lastGenOutput = genOutput;
                                lastCritique = critique;
                            } else {
                                attempt = Math.max(1, attempt - 1);
                                continue;
                            }
                        }

                        console.warn(`${tierName} review failed:`, reasons);
                        attempt++;
                        deviationReasons = reasons.length > 0 ? reasons : ["General validation failure from review agent."];
                        lastGenOutput = genOutput;
                        lastCritique = critique;
                    }
                }

                // If loop exits, all 4 attempts failed.
                console.error(`Escalation failed at ${tierName}. Last deviation reasons:`, deviationReasons);

                if (isAutopilot) {
                    if (!parentTierFailFn && lastParsedData) {
                        showToast(`Autopilot: Proceeding with last valid ${tierName} despite validation warnings.`, 'warning');
                        return { genOutput: lastGenOutput, parsedData: lastParsedData, spawnedBriefs };
                    } else {
                        if (tierName === "Writing Agent") {
                            showToast(`Writing Agent failed. Fallback: using last version of prose.`, 'warning');
                            const fallbackProse = extractTag(lastGenOutput, 'prose_text') || lastGenOutput;
                            return { genOutput: lastGenOutput, parsedData: { prose: fallbackProse }, failed: true, critique: lastCritique, spawnedBriefs };
                        }
                        showToast(`Escalation failed at ${tierName}. Triggering cascading deletion...`, 'error');
                        if (parentTierFailFn) {
                            await parentTierFailFn(deviationReasons);
                        }
                        throw new Error(`Cascading deletion triggered by ${tierName} failure.`);
                    }
                } else {
                    // Interactive Mode: Await user decision via InterventionModal
                    showToast(`Verification failed at ${tierName}. Awaiting intervention...`, 'warning');
                    return new Promise((resolve, reject) => {
                        setInterventionState({
                            isOpen: true,
                            tierName,
                            deviationReasons,
                            rawOutput: lastGenOutput || deviationReasons.join("\n"),
                            onResolve: async (action, editedText) => {
                                setInterventionState(prev => ({ ...prev, isOpen: false }));
                                if (action === 'accept') {
                                    const textToParse = editedText || lastGenOutput;
                                    try {
                                        const parsedData = parserFn(textToParse);
                                        showToast(`Proceeding with selected draft for ${tierName}.`, 'success');
                                        resolve({ genOutput: textToParse, parsedData, spawnedBriefs });
                                    } catch (err) {
                                        showToast("Parser failed on edited text: " + err.message, "error");
                                        reject(err);
                                    }
                                } else if (action === 'retry') {
                                    showToast(`Restarting generation for ${tierName}...`, 'info');
                                    try {
                                        const res = await runAgentWithEscalation({
                                            tierName,
                                            generatorPromptFn,
                                            systemPrompt,
                                            reviewerSystemPrompt,
                                            reviewerPromptFn,
                                            parserFn,
                                            modelSize,
                                            spawningContext,
                                            parentTierFailFn,
                                            activeActNum,
                                            activeSceneNum,
                                            isAutopilot
                                        });
                                        resolve(res);
                                    } catch (err) {
                                        reject(err);
                                    }
                                } else {
                                    if (tierName === "Writing Agent") {
                                        showToast(`Writing Agent failed. Fallback: using last version of prose.`, 'warning');
                                        const fallbackProse = extractTag(lastGenOutput, 'prose_text') || lastGenOutput;
                                        resolve({ genOutput: lastGenOutput, parsedData: { prose: fallbackProse }, failed: true, critique: lastCritique, spawnedBriefs });
                                        return;
                                    }
                                    showToast(`Cascading deletion triggered.`, 'error');
                                    if (parentTierFailFn) {
                                        await parentTierFailFn(deviationReasons);
                                    }
                                    reject(new Error(`Cascading deletion triggered by ${tierName} failure.`));
                                }
                            }
                        });
                    });
                }
            };

            const initStory = async (isAutopilotOrEvent = false) => {
                const isAutopilot = typeof isAutopilotOrEvent === 'boolean' ? isAutopilotOrEvent : false;
                const conceptToUse = inputConcept;
                if (!conceptToUse) return;
                setLoading(true);

                // Flush Audio Cache
                Object.values(audioCache).forEach(url => URL.revokeObjectURL(url));
                setAudioCache({});
                setAudioState({ id: null, status: 'idle', player: null });

                // Reset selection state
                setSelectedAct(null);
                setSelectedScene(null);

                try {
                    // Inject Imported Lore into the Concept Prompt
                    let finalPrompt = `<concept>${conceptToUse}</concept>`;
                    if (worldPrimer) {
                        finalPrompt += `\n\n<world_primer>${worldPrimer}</world_primer>`;
                        const relevantChunks = await retrieveContext(`Concept: ${conceptToUse} Themes and Tone`, 0.6);
                        if (relevantChunks.length > 0) {
                            finalPrompt += `\n\n<relevant_lore>${relevantChunks.map(c => c.text).join('\n')}</relevant_lore>`;
                        }
                    } else if (importedLoreText && importedLoreText.trim().length > 0) {
                        finalPrompt += `\n\n<author_lore_notes>${importedLoreText}</author_lore_notes>`;
                    }

                    // TIER 0.1: Conceptual Development
                    setLoadingStep("Conceptual Development (Tier 0.1)...");
                    const conceptOutput = await callAI(finalPrompt, PROMPTS.conceptualDevelopment, false, "Conceptual Development (0.1)", "large");

                    const genre = extractTag(conceptOutput, 'genre_classification');
                    const styleDesc = extractTag(conceptOutput, 'writing_style_description');
                    const toneAtmosphere = extractTag(conceptOutput, 'tone_and_atmosphere');
                    const worldBible = extractTag(conceptOutput, 'world_bible');

                    // Parse initial cast roster
                    const briefBlocks = extractAllTags(conceptOutput, 'character_briefs');
                    let startingCast = briefBlocks.map(extractCharacterBrief);

                    // TIER 0.2: Character Development
                    setLoadingStep("Character Development (Tier 0.2)...");
                    for (let i = 0; i < startingCast.length; i++) {
                        const char = startingCast[i];
                        setLoadingStep(`Interviewing starting cast: ${char.name}...`);
                        
                        const interviewPrompt = `
<world_bible>${worldBible}</world_bible>
<character_briefs>
<char_id>${char.id}</char_id>
${char.name}
<brief_role>${char.role}</brief_role>
<core_flaw>${char.core_flaw}</core_flaw>
<core_desire>${char.core_desire}</core_desire>
</character_briefs>
`;
                        const interviewOutput = await callAI(interviewPrompt, PROMPTS.characterDevelopment, false, `Character Developer (${char.name})`, "large");
                        const interviewText = extractTag(interviewOutput, 'first_person_interview') || interviewOutput;
                        
                        char.voice_sample = interviewText.split('.')[0].substring(0, 100) + "...";
                        char.details = {
                            history: char.core_flaw,
                            story_events: "Identified in conceptual worldbuilding",
                            goals: char.core_desire,
                            deep_profile: interviewText
                        };
                    }

                    // Build initial relationship state mapping ID to Name
                    const idToName = {};
                    startingCast.forEach(c => { idToName[c.id] = c.name; });

                    const rawRels = extractAllTags(conceptOutput, 'relationship_matrix').map(extractRelationship);
                    const relationships = {};
                    rawRels.forEach(rel => {
                        const nameFrom = idToName[rel.from] || rel.from;
                        const nameTo = idToName[rel.to] || rel.to;
                        const key = `${nameFrom}->${nameTo}`;
                        relationships[key] = {
                            current: rel.feeling,
                            history: [
                                { chapter: "Act 1, Starting", change: `${rel.feeling} (Initial Dynamic)` }
                            ]
                        };
                    });

                    // Build baseline story state for the Edit Router
                    let initialStoryState = {
                        title: inputTitle || "My New Story",
                        concept: conceptToUse,
                        status_quo: worldBible,
                        inciting_incident: "To be wove in Acts",
                        themes: toneAtmosphere,
                        style: {
                            genre: genre,
                            mood: toneAtmosphere,
                            writing_guide: styleDesc
                        },
                        threads: [
                            { id: "T1", name: "Main Plot Thread (A-Story)" },
                            { id: "T2", name: "Relational/Internal Subplot Thread (B-Story)" }
                        ],
                        cast: startingCast,
                        lore: [],
                        acts: [],
                        scenes: {},
                        beats: {},
                        prose: {},
                        continuity_ledger: [],
                        relationships: relationships,
                        graph_edges: []
                    };
                    
                    // Temp set story to this baseline so callAI/retrieveContext has context
                    setStory(initialStoryState);
                    story.cast = startingCast;
                    story.status_quo = worldBible;
                    story.themes = toneAtmosphere;
                    story.relationships = relationships;

                    // TIER 1.1 & 1.2: Story Arc & Review
                    setLoadingStep("Story Arc Planner (Tier 1.1)...");
                    const arcResult = await runAgentWithEscalation({
                        tierName: "Story Arc Agent",
                        isAutopilot,
                        generatorPromptFn: () => `
<world_bible>
${worldBible}
</world_bible>
<genre>
${genre}
</genre>
<style>
${styleDesc}
</style>
<tone_and_atmosphere>
${toneAtmosphere}
</tone_and_atmosphere>
<cast_list>
${startingCast.map(c => `- ${c.name} (${c.role}): Flaw: ${c.core_flaw}, Desire: ${c.core_desire}`).join('\n')}
</cast_list>
`,
                        systemPrompt: PROMPTS.storyArc,
                        reviewerSystemPrompt: PROMPTS.arcReview,
                        reviewerPromptFn: (genOutput) => `
<user_concept>
${conceptToUse}
</user_concept>
<generated_story_arc>
${genOutput}
</generated_story_arc>
`,
                        parserFn: (text) => {
                            const globalArcBlock = extractTag(text, 'global_arc');
                            const startingVal = extractTag(globalArcBlock, 'starting_value_state');
                            const endingVal = extractTag(globalArcBlock, 'ending_value_state');
                            const surprises = extractTag(globalArcBlock, 'major_surprises_and_twists');
                            
                            const charArcs = extractAllTags(text, 'character_arc').map(extractCharacterArc);
                            
                            const threadsBlock = extractTag(text, 'narrative_threads');
                            const threadBlocks = extractAllTags(threadsBlock, 'thread');
                            const threads = threadBlocks.map(block => ({
                                id: extractTag(block, 'thread_id'),
                                name: extractTag(block, 'name'),
                                description: extractTag(block, 'description')
                            }));
                            
                            return {
                                starting_value_state: startingVal,
                                ending_value_state: endingVal,
                                major_surprises_and_twists: surprises,
                                character_arcs: charArcs,
                                threads: threads
                            };
                        },
                        modelSize: "large",
                        spawningContext: "Story Arc planning"
                    });

                    // Update story state with Story Arc results
                    initialStoryState.inciting_incident = arcResult.parsedData.starting_value_state;
                    if (arcResult.parsedData.threads && arcResult.parsedData.threads.length > 0) {
                        initialStoryState.threads = arcResult.parsedData.threads;
                    }
                    
                    // TIER 2.1 & 2.2: Act Planner & Review
                    setLoadingStep("Act Planner (Tier 2.1)...");
                    const actResult = await runAgentWithEscalation({
                        tierName: "Act Agent",
                        isAutopilot,
                        generatorPromptFn: () => `
<story_arc>
<starting_value>${arcResult.parsedData.starting_value_state}</starting_value>
<ending_value>${arcResult.parsedData.ending_value_state}</ending_value>
<twists_and_surprises>${arcResult.parsedData.major_surprises_and_twists}</twists_and_surprises>
</story_arc>

<narrative_threads>
${(initialStoryState.threads || []).map(t => `<thread><thread_id>${t.id}</thread_id><name>${t.name}</name><description>${t.description}</description></thread>`).join('\n')}
</narrative_threads>

<cast_list>
${story.cast.map(c => `- ${c.name} (${c.role})`).join('\n')}
</cast_list>
`,
                        systemPrompt: PROMPTS.actAgent,
                        reviewerSystemPrompt: PROMPTS.actReview,
                        reviewerPromptFn: (genOutput) => `
<story_arc_twists_and_surprises>
${arcResult.parsedData.major_surprises_and_twists}
</story_arc_twists_and_surprises>
<generated_acts>
${genOutput}
</generated_acts>
`,
                        parserFn: (text) => {
                            const actBlocks = extractAllTags(text, 'act');
                            const parsedActs = actBlocks.map(block => {
                                const number = parseInt(extractTag(block, 'number'), 10);
                                const title = extractTag(block, 'title');
                                const mandate = extractTag(block, 'act_mandate');
                                const worldBuilding = extractTag(block, 'world_building_developments');
                                
                                const knotBlocks = extractAllTags(block, 'knot');
                                const knots = knotBlocks.map(k => ({
                                    description: extractTag(k, 'description'),
                                    interaction: extractTag(k, 'interaction')
                                }));
                                
                                return {
                                    number,
                                    title,
                                    act_mandate: mandate,
                                    description: mandate,
                                    world_building_developments: worldBuilding,
                                    knots
                                };
                            });
                            
                            const threadBlocks = extractAllTags(text, 'thread_status');
                            const threads = threadBlocks.map(extractThreadStatus);
                            
                            const relBlocks = extractAllTags(text, 'shift');
                            const relShifts = relBlocks.map(extractRelationshipShift);
                            
                            return {
                                acts: parsedActs,
                                thread_statuses: threads,
                                relationship_shifts: relShifts
                            };
                        },
                        modelSize: "large",
                        spawningContext: "Act division and pacing",
                        parentTierFailFn: async (reasons) => {
                            setStory(prev => {
                                const nextStory = { ...prev };
                                nextStory.acts = [];
                                nextStory.scenes = {};
                                return nextStory;
                            });
                            setFeedbackLedger(prev => ({
                                ...prev,
                                "Story Arc Agent": reasons
                            }));
                        }
                    });

                    // We now merge relationships shifts from the act structure
                    const nextRels = { ...initialStoryState.relationships };
                    if (actResult.parsedData.relationship_shifts) {
                        actResult.parsedData.relationship_shifts.forEach(shift => {
                            const key = `${shift.from}->${shift.to}`;
                            if (!nextRels[key]) nextRels[key] = { current: "", history: [] };
                            nextRels[key].current = shift.new_feeling;
                            nextRels[key].history.push({
                                chapter: "Act Structure planning",
                                change: `${shift.new_feeling} (Structured shift)`
                            });
                        });
                    }

                    // Schedule lore reveals / RAG ingest
                    setLoadingStep("Archiving world lore...");
                    const loreList = [];
                    loreList.push({
                        topic: "World Bible Setting",
                        detail: worldBible,
                        valid_from_act: 1,
                        valid_from_scene: 1
                    });
                    
                    await ingestLoreBatch(loreList);

                    const finalStory = {
                        ...initialStoryState,
                        cast: story.cast,
                        lore: loreList,
                        acts: actResult.parsedData.acts,
                        relationships: nextRels,
                        threads: initialStoryState.threads
                    };

                    setStory(finalStory);
                    setView('dashboard');
                    showToast("Story Bible initialized successfully!");
                    return finalStory;
                } catch (e) {
                    console.error("Initialization failed:", e);
                    alert("Initialization failed: " + e.message);
                } finally {
                    if (!isAutopilot) setLoading(false);
                }
            };



            // Single Item Ingest with Redundancy Check
            const ingestLore = async (item) => {
                if (!item.topic || !item.detail) return { ...item, is_merged: false };

                // 1. Check for Semantic Redundancy
                const tempEmbedding = await embeddingService.current.getEmbedding(`${item.topic}: ${item.description || item.detail}`);
                if (!tempEmbedding) return item;

                const redundancy = await vectorStore.current.checkRedundancy(tempEmbedding, 0.85);

                if (redundancy) {
                    // MERGE
                    const mergedDetail = await callAI(
                        `Existing: ${redundancy.text}\nNew: ${item.detail}\n\nTask: Merge these two lore entries into one concise, consistent entry.`,
                        "You are a Lore Keeper.",
                        false, // Text output
                        "Lore Merger"
                    );

                    // Update Vector Store

                        const idx = processedList.findIndex(p => p.topic === processed.topic);

                // 1. If currently playing THIS track, stop it

                    audioState.player.pause();
                    audioState.player.currentTime = 0;
                    setAudioState({ id: null, status: 'idle', player: null });
                    return;
                }

                // 2. If playing ANOTHER track, stop it first
                if (audioState.player) {
                    audioState.player.pause();
                    audioState.player.currentTime = 0;
                    // We don't return here, we proceed to play the new one
                }

                // 3. CHECK CACHE
                if (audioCache[id]) {
                    // Play from cache
                    try {
                        const audio = new Audio(audioCache[id]);
                        audio.onended = () => setAudioState({ id: null, status: 'idle', player: null });

                        setAudioState({ id, status: 'playing', player: audio });

                        await audio.play();
                    } catch (e) {
                        console.error("Playback failed:", e);
                        setAudioState({ id: null, status: 'idle', player: null });
                        alert("Playback failed. Please try again.");
                    }
                    return;
                }

                // 4. GENERATE NEW
                setAudioState({ id, status: 'loading', player: null });

                try {
                    const url = await callTTS(apiKey, text);
                    setAudioCache(prev => ({ ...prev, [id]: url }));
                    // We do NOT auto-play here to avoid iOS issues. 
                    // User sees Play button -> clicks it -> plays from cache (Step 3).
                    setAudioState({ id: null, status: 'idle', player: null });

            const handleWorldUpdates = async (updates, activeActNum = 1, activeSceneNum = 1) => {
                if (!updates) return;

                // RAG: Pre-process Lore Updates (Async Ingestion + Deduplication)
                if (updates.lore_updates && updates.lore_updates.length > 0) {
                    setRagStatus("indexing");
                    const processedLoreStart = [];
                    for (const up of updates.lore_updates) {
                        const rawItem = {
                            topic: up.topic,
                            detail: up.detail,
                            valid_from_act: activeActNum,
                            valid_from_scene: activeSceneNum
                        };
                        // This awaits the embedding call and redundancy check
                        const processed = await ingestLore(rawItem);
                        processedLoreStart.push(processed);
                    }
                    setRagStatus("idle");

                    // Now Update React State with processed items
                    setStory(prev => {
                        let newCast = [...prev.cast];
                        // Logic for Cast (same as before)
                        if (updates.cast_updates) {
                            updates.cast_updates.forEach(up => {
                                const idx = newCast.findIndex(c => c.name === up.name);
                                if (idx !== -1) {
                                    const char = newCast[idx];
                                    if (!char.details) char.details = { history: "", story_events: "", goals: "", evolution: "" };
                                    if (up.append_history) char.details.history += `\n[New]: ${up.append_history}`;
                                    if (up.append_story_events) char.details.story_events += `\n- ${up.append_story_events}`;
                                    if (up.update_goals) char.details.goals = up.update_goals;
                                    newCast[idx] = char;
                                }
                            });
                        }

                        if (updates.new_characters) {
                            updates.new_characters.forEach(nc => {
                                if (!newCast.find(c => c.name === nc.name)) newCast.push(nc);
                            });
                        }

                        let newLore = [...prev.lore];
                        processedLoreStart.forEach(pItem => {
                            if (pItem.is_merged) {
                                // Update existing item in State
                                const idx = newLore.findIndex(l => l.topic === pItem.topic);
                                if (idx !== -1) {
                                    newLore[idx] = { ...newLore[idx], detail: pItem.detail };
                                }
                            } else {
                                // Add new
                                if (!newLore.find(l => l.topic === pItem.topic)) {
                                    newLore.push(pItem);
                                }
                            }
                        });

                        // Unified relationship updates
                        const newRels = { ...(prev.relationships || {}) };
                        if (updates.relationship_updates) {
                            updates.relationship_updates.forEach(up => {
                                const key = `${up.from}->${up.to}`;
                                if (!newRels[key]) {
                                    newRels[key] = { current: "", history: [] };
                                }
                                newRels[key].current = up.new_feeling;
                                if (!newRels[key].history) newRels[key].history = [];
                                newRels[key].history.push({
                                    chapter: `Act ${activeActNum}, Scene ${activeSceneNum}`,
                                    change: `${up.new_feeling} (${up.trigger})`
                                });
                            });
                        }

                        return { ...prev, cast: newCast, lore: newLore, relationships: newRels };
                    });

                        if (updates.new_characters) {

            const callImageAPI = async (prompt, aspectRatio = "1:1") => {
                const prov = imageProvider;
                const model = imageModel;
                const key = imageApiKey || (prov === 'gemini' ? apiKey : openRouterKey);

                if (!key) {
                    throw new Error(`API key for provider "${prov}" is not configured. Please check your settings.`);
                }

                if (prov === 'gemini') {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateImages?key=${key}`;
                    const payload = {
                        prompt: prompt,
                        numberOfImages: 1,
                        outputMimeType: "image/jpeg",
                        aspectRatio: aspectRatio
                    };
                    
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!response.ok) {
                        const errText = await response.text();
                        throw new Error(`Gemini Image API failed: ${response.status} - ${errText}`);
                    }
                    
                    const data = await response.json();
                    const b64 = data.generatedImages?.[0]?.image?.imageBytes;
                    if (!b64) {
                        throw new Error(`No image returned from Gemini Imagen API. Response: ${JSON.stringify(data)}`);
                    }
                    return `data:image/jpeg;base64,${b64}`;
                } else if (prov === 'openrouter') {
                    const url = `https://openrouter.ai/api/v1/chat/completions`;
                    const payload = {
                        model: model,
                        messages: [
                            { role: "user", content: prompt }
                        ],
                        modalities: ["image"]
                    };
                    
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${key}`,
                            'HTTP-Referer': window.location.href,
                            'X-Title': 'EllipsisProse'
                        },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!response.ok) {
                        const errText = await response.text();
                        throw new Error(`OpenRouter Image API failed: ${response.status} - ${errText}`);
                    }
                    
                    const data = await response.json();
                    const choice = data.choices?.[0];
                    const msg = choice?.message;
                    const images = msg?.images;
                    const imgObj = images?.[0];
                    const imgUrl = imgObj?.image_url?.url || imgObj?.url;
                    
                    if (!imgUrl) {
                        throw new Error(`No image URL returned from OpenRouter. Response: ${JSON.stringify(data)}`);
                    }
                    
                    if (imgUrl.startsWith("data:")) {
                        return imgUrl;
                    }
                    
                    const imgResponse = await fetch(imgUrl);
                    if (!imgResponse.ok) {
                        throw new Error(`Failed to fetch image from URL returned by OpenRouter: ${imgResponse.statusText}`);
                    }
                    const blob = await imgResponse.blob();
                    return new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onloadend = () => resolve(reader.result);
                        reader.onerror = reject;
                        reader.readAsDataURL(blob);
                    });
                } else {
                    throw new Error(`Unsupported Image Provider: ${prov}`);
                }
            };

You will take a novel's title, concept, status quo, inciting incident, and genre, and create a single highly detailed and symbolic image generation prompt for a book cover.

                    const userPrompt = `NOVEL INFORMATION:
Title: ${story.title || "Untitled Novel"}
Genre: ${story.style?.genre || "Not specified"}
Concept: ${story.concept || "Not specified"}
Status Quo: ${story.status_quo || "Not specified"}

                if (!embeddingService.current || !vectorStore.current) return [];

                try {
                    // 0. Query Expansion (Agentic Step)
                    // We only do this for purely narrative queries, not system queries like "Concept..."
                    let searchKey = query;
                    if (!query.startsWith("Concept:")) {
                        try {

                    let augmentedResults = [...results];

                                // Optimization: For now, we search memory 'story.lore' as fallback or query DB by topic index if strict.

                                        score: 1.0, // High relevance by relation
                                        metadata: { topic: neighborItem.topic, relation: "Graph Neighbor of " + res.metadata.topic }
                                    });
                                    processedTopics.add(neighborTopic);
                                }
                            }

                const getModel = () => {

                    }
                    if (apiProvider === 'gemini') return geminiModel;

                };
                const modelToUse = getModel();

                // Determine thinking options based on the agent log name
                let thinkingConfig = null;
                if (logName.includes("Act Agent")) {
                    if (enableThinkingAct) {
                        thinkingConfig = {
                            enabled: true,
                            budget: thinkingBudgetAct,
                            level: thinkingLevelAct,

                            enabled: true,
                            budget: thinkingBudgetScene,

                            effort: thinkingEffortScene
                        };

                } else if (logName.includes("Writing Agent")) {
                    if (enableThinkingWriting) {
