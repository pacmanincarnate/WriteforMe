        const { useState, useEffect, useRef, useMemo } = React;

                }

        };

        /* ----------------------------------------------------------------------
          UTILS: AUDIO & MARKDOWN
          ----------------------------------------------------------------------
        */




        const pcmToWav = (pcmData, sampleRate = 24000) => {
            const buffer = new ArrayBuffer(44 + pcmData.byteLength);
            const view = new DataView(buffer);
            const writeString = (view, offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + pcmData.byteLength, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(view, 36, 'data');
            view.setUint32(40, pcmData.byteLength, true);
            const pcmBytes = new Uint8Array(pcmData);
            const wavBytes = new Uint8Array(buffer, 44);
            wavBytes.set(pcmBytes);
            return buffer;
        };

        const parseMarkdown = (text) => {
            if (!text) return "";
            try {
                if (window.marked) {
                    marked.use({
                        gfm: true,
                        breaks: true
                    });
                    return marked.parse(text);
                }
            } catch (e) {
                console.error("Failed to parse markdown with marked, falling back:", e);
            }
            let html = text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br />');
            return `<p>${html}</p>`;
        };

        /* ----------------------------------------------------------------------
          STORY ARCHETYPES (Generator Lists)
          ----------------------------------------------------------------------
        */
        const ARCH_GENRES = [
            "Space Opera", "Cyberpunk", "High Fantasy", "Urban Fantasy", "Post-Apocalyptic",
            "Dystopian", "Gothic Horror", "Cosmic Horror", "Hard Boiled Noir", "Western",
            "Steampunk", "Romantic Comedy", "Political Thriller", "Espionage", "Superhero",
            "Slice of Life", "Historical Drama", "Military Sci-Fi", "Whodunit", "Survival Thriller"
        ];

        const ARCH_STYLES = [
            "Moody & Atmospheric", "Fast-paced & Kinetic", "Witty & Satirical", "Dark & Gritty",
            "Optimistic & Whimsical", "Intellectual & Philosophical", "Minimalist & Stark",
            "Lyrical & Poetic", "Suspenseful & Tense", "Melancholic & Reflective",
            "Campy & Over-the-top", "Brutal & Unflinching"
        ];

        const ARCH_CONCEPTS = [
            "a lone wanderer seeks redemption for a past sin",
            "a team of specialists pulls off the ultimate heist",
            "a detective investigates a murder that shouldn't be possible",
            "strangers are trapped together in a confined location",
            "a chosen one rejects their destiny",
            "an artificial intelligence discovers emotions",
            "a magical artifact ruins the life of its owner",
            "two enemies are forced to work together to survive",
            "a civilization faces imminent collapse from an unseen threat",
            "a character wakes up with no memory in a strange world",
            "a forbidden romance alters the course of history",
            "a small lie spirals out of control into a global conspiracy",
            "an explorer discovers a land that defies the laws of physics",
            "a soldier questions the morality of their orders",
            "a family secret threatens to destroy a dynasty",
            "a scientist's experiment goes horribly wrong",
            "a underdog competes in a high-stakes tournament",
            "a ghost tries to solve their own murder",
            "a time traveler tries to fix a mistake but makes it worse",
            "a peaceful community is invaded by a superior force"
        ];

        const generateRandomArchetypes = (count = 20) => {
            const options = [];
            for (let i = 0; i < count; i++) {
                const genre = ARCH_GENRES[Math.floor(Math.random() * ARCH_GENRES.length)];
                const style = ARCH_STYLES[Math.floor(Math.random() * ARCH_STYLES.length)];
                const concept = ARCH_CONCEPTS[Math.floor(Math.random() * ARCH_CONCEPTS.length)];

                options.push({
                    id: i,
                    label: `${genre} / ${style} / ${concept.substring(0, 30)}...`,
                    value: `A ${genre} story written in a ${style} style, wherein ${concept}.`
                });
            }
            return options;
        };

        /* ----------------------------------------------------------------------
          GEMINI PROMPTS
          ----------------------------------------------------------------------
        */
        const cleanJson = (text) => {
            if (!text) return "";
            // Try matching markdown code blocks first
            const match = text.match(/```(?:json)?\s*([\s\S]*?)\s*```/);
            if (match) return match[1].trim();

            // Look for outer braces (for objects) or brackets (for arrays)
            const startObj = text.indexOf('{');
            const endObj = text.lastIndexOf('}');
            const startArr = text.indexOf('[');
            const endArr = text.lastIndexOf(']');

            let start = -1;
            let end = -1;
            
            if (startObj !== -1 && startArr !== -1) {
                start = Math.min(startObj, startArr);
            } else {
                start = startObj !== -1 ? startObj : startArr;
            }

            if (endObj !== -1 && endArr !== -1) {
                end = Math.max(endObj, endArr);
            } else {
                end = endObj !== -1 ? endObj : endArr;
            }

            if (start !== -1 && end !== -1 && end > start) {
                return text.substring(start, end + 1);
            }
            return text.trim();
        };

        /* --- XML PARSER HELPERS --- */
        const decodeXmlEntities = (str) => {
            if (!str) return "";
            return str
                .replace(/&amp;/g, "&")
                .replace(/&lt;/g, "<")
                .replace(/&gt;/g, ">")
                .replace(/&quot;/g, '"')
                .replace(/&apos;/g, "'")
                .replace(/&#(\d+);/g, (match, dec) => String.fromCharCode(parseInt(dec, 10)))
                .replace(/&#x([0-9a-fA-F]+);/g, (match, hex) => String.fromCharCode(parseInt(hex, 16)))
                .replace(/&amp/g, "&"); // Handle malformed &amp without semicolon
        };

        const extractTag = (text, tag) => {
            if (!text) return "";
            const regex = new RegExp(`<${tag}>(.*?)</${tag}>`, 'si');
            const match = text.match(regex);
            return match ? decodeXmlEntities(match[1].trim()) : "";
        };

        const extractAllTags = (text, tag) => {
            if (!text) return [];
            const regex = new RegExp(`<${tag}>(.*?)</${tag}>`, 'gsi');
            const matches = [...text.matchAll(regex)];
            return matches.map(m => decodeXmlEntities(m[1].trim()));
        };

        const extractCharacterBrief = (block) => {
            const charId = extractTag(block, 'char_id');
            const briefRole = extractTag(block, 'brief_role');
            const coreFlaw = extractTag(block, 'core_flaw');
            const coreDesire = extractTag(block, 'core_desire');
            
            let name = block
                .replace(new RegExp(`<char_id>.*?</char_id>`, 's'), '')
                .replace(new RegExp(`<brief_role>.*?</brief_role>`, 's'), '')
                .replace(new RegExp(`<core_flaw>.*?</core_flaw>`, 's'), '')
                .replace(new RegExp(`<core_desire>.*?</core_desire>`, 's'), '')
                .trim();
            
            // Clean up any remaining XML tags from the name
            name = name.replace(/<\/?[a-zA-Z0-9_]+>/g, '').trim().split('\n')[0].trim();
            name = decodeXmlEntities(name);
            
            return {
                id: charId || `C_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`,
                name: name || "Unnamed Character",
                role: briefRole,
                core_flaw: coreFlaw,
                core_desire: coreDesire
            };
        };

        const extractRelationship = (block) => {
            const sourceId = extractTag(block, 'source_id');
            const targetId = extractTag(block, 'target_id');
            const dynamicSummary = extractTag(block, 'dynamic_summary');
            const hiddenTension = extractTag(block, 'hidden_tension');
            const trustLevel = parseInt(extractTag(block, 'trust_level'), 10) || 5;
            return {
                from: sourceId,
                to: targetId,
                feeling: dynamicSummary,
                hidden_tension: hiddenTension,
                trust_level: trustLevel
            };
        };

        const extractCharacterArc = (block) => {
            const charId = extractTag(block, 'char_id');
            const arcDescription = extractTag(block, 'arc_description');
            return {
                char_id: charId,
                description: arcDescription
            };
        };

        const extractRelationshipShift = (block) => {
            const sourceId = extractTag(block, 'source_id');
            const targetId = extractTag(block, 'target_id');
            const newDynamic = extractTag(block, 'new_dynamic');
            return {
                from: sourceId,
                to: targetId,
                new_feeling: newDynamic
            };
        };

        const extractThreadStatus = (block) => {
            const threadId = extractTag(block, 'thread_id');
            const status = extractTag(block, 'status');
            return {
                id: threadId,
                status: status
            };
        };

        const extractScene = (block) => {
            const sceneId = extractTag(block, 'scene_id');
            const objective = extractTag(block, 'scene_objective');
            const description = extractTag(block, 'rich_scene_description');
            
            const dominantNarrativeModeBlock = extractTag(block, 'dominant_narrative_mode');
            const dominantNarrativeMode = extractTag(dominantNarrativeModeBlock, 'mode_id') || extractTag(block, 'dominant_narrative_mode') || "BASELINE_NEUTRAL";

            const valueShiftBlock = extractTag(block, 'value_shift');
            const startValence = extractTag(valueShiftBlock, 'start_state');
            const endValence = extractTag(valueShiftBlock, 'end_state');
            
            const charsPresentBlock = extractTag(block, 'characters_present');
            const castIds = extractAllTags(charsPresentBlock, 'char_id');
            
            const threadsBlock = extractTag(block, 'threads_advanced');
            const threadIds = extractAllTags(threadsBlock, 'thread_id');
            
            const stateChangesBlock = extractTag(block, 'state_changes_introduced');
            const rawChanges = extractAllTags(stateChangesBlock, 'change');
            const stateChanges = rawChanges.map(changeBlock => ({
                entity_id: extractTag(changeBlock, 'entity_id'),
                relation: extractTag(changeBlock, 'relation'),
                target: extractTag(changeBlock, 'target')
            }));
            
            const relShiftsBlock = extractTag(block, 'relationship_shifts');
            const rawShifts = extractAllTags(relShiftsBlock, 'shift');
            const relShifts = rawShifts.map(extractRelationshipShift);
            
            const charBriefs = extractAllTags(block, 'new_character_briefs').map(extractCharacterBrief);
            
            let title = block
                .replace(new RegExp(`<scene_id>.*?</scene_id>`, 's'), '')
                .replace(new RegExp(`<characters_present>.*?</characters_present>`, 's'), '')
                .replace(new RegExp(`<threads_advanced>.*?</threads_advanced>`, 's'), '')
                .replace(new RegExp(`<scene_objective>.*?</scene_objective>`, 's'), '')
                .replace(new RegExp(`<rich_scene_description>.*?</rich_scene_description>`, 's'), '')
                .replace(new RegExp(`<value_shift>.*?</value_shift>`, 's'), '')
                .replace(new RegExp(`<state_changes_introduced>.*?</state_changes_introduced>`, 's'), '')
                .replace(new RegExp(`<relationship_shifts>.*?</relationship_shifts>`, 's'), '')
                .replace(new RegExp(`<new_character_briefs>.*?</new_character_briefs>`, 's'), '')
                .replace(new RegExp(`<dominant_narrative_mode>.*?</dominant_narrative_mode>`, 's'), '')
                .trim();
            
            title = decodeXmlEntities(title.replace(/<\/?[a-zA-Z0-9_]+>/g, '').trim().split('\n')[0].trim());
            
            return {
                id: sceneId,
                title: title || "Untitled Scene",
                objective: objective,
                description: description,
                start_valence: startValence,
                end_valence: endValence,
                valence: parseInt(endValence, 10) || 0,
                cast_ids: castIds,
                thread_ids: threadIds,
                active_thread_ids: threadIds,
                state_changes: stateChanges,
                relationship_shifts: relShifts,
                new_character_briefs: charBriefs,
                dominant_narrative_mode: dominantNarrativeMode
            };
        };

        const extractBeat = (block) => {
            const sceneId = extractTag(block, 'scene_id') || extractTag(block, 'sceneId');
            const beatId = extractTag(block, 'beat_id') || extractTag(block, 'beatId');
            const tactic = extractTag(block, 'char_A_tactic') || extractTag(block, 'tactic');
            const action = extractTag(block, 'char_A_action') || extractTag(block, 'action');
            const reaction = extractTag(block, 'char_B_reaction') || extractTag(block, 'reaction');
            const powerShift = extractTag(block, 'power_shift') || extractTag(block, 'powerShift');
            const valence = parseInt(extractTag(block, 'valence'), 10) || 0;
            const modeOverride = extractTag(block, 'mode_override') || extractTag(block, 'modeOverride') || null;
            
            const beatStructure = extractTag(block, 'beat_structure') || extractTag(block, 'beatStructure');
            const characterIntent = extractTag(block, 'character_intent') || extractTag(block, 'characterIntent');
            const atmosphereAndFeel = extractTag(block, 'atmosphere_and_feel') || extractTag(block, 'atmosphereAndFeel');
            const authorialIntent = extractTag(block, 'authorial_intent') || extractTag(block, 'authorialIntent');
            
            let description = "";
            if (beatStructure || characterIntent || atmosphereAndFeel || authorialIntent) {
                const parts = [];
                if (beatStructure) parts.push(`**STRUCTURE:**\n${beatStructure.trim()}\n`);
                if (characterIntent) parts.push(`**CHARACTER INTENT:**\n${characterIntent.trim()}\n`);
                if (atmosphereAndFeel) parts.push(`**ATMOSPHERE & FEEL:**\n${atmosphereAndFeel.trim()}\n`);
                if (authorialIntent) parts.push(`**AUTHORIAL INTENT:**\n${authorialIntent.trim()}\n`);
                
                if (tactic || action || reaction) {
                    parts.push(`**CHOREOGRAPHY:**`);

                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);

                const wavBuffer = pcmToWav(bytes.buffer);
                const blob = new Blob([wavBuffer], { type: 'audio/wav' });
                const url = URL.createObjectURL(blob);
                return url;
            } catch (error) {
                console.error("TTS Error:", error);
                throw error;
            }
        };

        const callOpenRouter = async (apiKey, model, prompt, systemPrompt, isJson = true, options = {}) => {
            try {
                const key = apiKey ? apiKey.trim() : "";
                if (!key) throw new Error("OpenRouter API Key is missing. Please add it in Settings.");

                const modelId = model || "google/gemini-2.0-flash-001";
                const payload = {
                    model: modelId,
                    messages: [
                        { role: "system", content: systemPrompt },
                        { role: "user", content: prompt }
                    ],
                    response_format: isJson ? { type: "json_object" } : undefined
                };

                // Add reasoning configs if enabled
                if (options.thinking && options.thinking.enabled) {
                    payload.include_reasoning = true;
                    payload.reasoning = {
                        enabled: true
                    };
                    
                    // Only one of effort or max_tokens can be specified.
                    // OpenAI's o1/o3-mini models only support effort.
                    const isOpenAiOModel = modelId.includes("openai/o1") || modelId.includes("openai/o3") || modelId.includes("o1-") || modelId.includes("o3-");
                    if (isOpenAiOModel) {
                        payload.reasoning.effort = options.thinking.effort || "medium";
                    } else if (options.thinking.budget && options.thinking.budget > 0) {
                        payload.reasoning.max_tokens = options.thinking.budget;
                    } else if (options.thinking.effort) {
                        payload.reasoning.effort = options.thinking.effort;
                    }
                }

                const response = await fetchWithTimeout("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${key}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.href,
                        "X-Title": "EllipsisProse"
                    },
                    body: JSON.stringify(payload)
                }, options.timeout);

                if (!response.ok) {
                    const errText = await response.text();
                    try {
                        const errJson = JSON.parse(errText);
                        if (response.status === 401) {
                            throw new Error(`OpenRouter Authorization Failed (401). Please check your API Key in Settings. Details: ${errJson.error?.message || errText}`);
                        }
                        throw new Error(`OpenRouter Error: ${response.status} - ${errJson.error?.message || errText}`);
                    } catch (e) {
                        if (e.message.startsWith("OpenRouter")) throw e;
                        throw new Error(`OpenRouter Error: ${response.status} - ${errText}`);
                    }
                }

                const responseText = await response.text();
                if (!responseText || !responseText.trim()) {
                    throw new Error("OpenRouter returned an empty response body.");
                }
                let data;
                try {
                    data = JSON.parse(responseText);
                } catch (e) {
                    throw new Error(`OpenRouter returned invalid JSON: ${responseText.substring(0, 200)}`);
                }
                if (data.error) {
                    throw new Error(`OpenRouter API returned error: ${data.error.message || JSON.stringify(data.error)}`);
                }

                let text = data.choices?.[0]?.message?.content || "";
                const msg = data.choices?.[0]?.message || {};
                let reasoningText = msg.reasoning || msg.reasoning_content || "";

                // Fallback for inline `<think>` tags within content
                if (!reasoningText && text.includes("<think>")) {
                    const thinkStart = text.indexOf("<think>");
                    const thinkEnd = text.indexOf("</think>");
                    if (thinkStart !== -1 && thinkEnd !== -1 && thinkEnd > thinkStart) {
                        reasoningText = text.substring(thinkStart + 7, thinkEnd).trim();
                        text = (text.substring(0, thinkStart) + text.substring(thinkEnd + 8)).trim();
                    }
                }

                // If content is empty but reasoning is present, use reasoning as fallback content
                if (!text && reasoningText) {
                    text = reasoningText;
                }

                if (text === undefined || text === null || String(text).trim() === "" || String(text) === "null") {
                    throw new Error(`OpenRouter returned no content. Response payload: ${JSON.stringify(data)}`);
                }

                // Call callback with metrics and reasoning text
                if (options.onSuccess) {
                    const usage = data.usage || {};
                    options.onSuccess({
                        modelUsed: data.model || modelId,
                        tokensUsed: usage.total_tokens || null,
                        reasoningTokensUsed: usage.completion_tokens_details?.reasoning_tokens || null,
                        reasoningText: reasoningText
                    });
                }

                if (isJson) {
                    try {
                        return JSON.parse(cleanJson(text));
                    } catch (e) {
                        console.error("OpenRouter JSON Parse Error. Raw Text:", text);
                        throw new Error(`Failed to parse OpenRouter response as JSON. Check console for details. Raw snippet: ${String(text).substring(0, 150)}`);
                    }
                }
                return text;
            } catch (error) {
                console.error("OpenRouter Error:", error);
                throw error;
            }
        };

        const cosineSimilarity = (vecA, vecB) => {
            let dotProduct = 0;
            let magnitudeA = 0;
            let magnitudeB = 0;
            for (let i = 0; i < vecA.length; i++) {
                dotProduct += vecA[i] * vecB[i];
                magnitudeA += vecA[i] * vecA[i];
                magnitudeB += vecB[i] * vecB[i];
            }
            magnitudeA = Math.sqrt(magnitudeA);
            magnitudeB = Math.sqrt(magnitudeB);
            if (magnitudeA === 0 || magnitudeB === 0) return 0;
            return dotProduct / (magnitudeA * magnitudeB);
        };

        class EmbeddingService {
            constructor(apiKey, provider = 'gemini') {
                this.apiKey = apiKey;
                this.provider = provider;
            }

            async getEmbedding(text) {
                if (!text || !text.trim()) return null;
                if (this.provider === 'gemini') {
                    return await this.getGeminiEmbedding(text);
                } else {
                    return await this.getOpenRouterEmbedding(text);
                }
            }

            async getGeminiEmbedding(text) {
                // ... (Existing Gemini Logic)
                const model = "gemini-embedding-001";
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:embedContent?key=${this.apiKey}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: `models/${model}`,
                        content: { parts: [{ text: text }] }
                    })
                });
                if (!response.ok) {
                    const err = await response.text();
                    throw new Error(`Gemini Embedding Failed: ${response.status} - ${err}`);
                }
                const data = await response.json();
                return data.embedding.values;
            }

            async getOpenRouterEmbedding(text) {
                // OpenRouter Embeddings (Standard OpenAI-compatible format)
                // We'll use a widely available model like coverage
                const model = "qwen/qwen3-embedding-8b"; // Or "google/text-embedding-004" if available via OR

                const response = await fetch("https://openrouter.ai/api/v1/embeddings", {
                    method: 'POST',
                    headers: {
                        "Authorization": `Bearer ${this.apiKey}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.href,
                        "X-Title": "EllipsisProse"
                    },
                    body: JSON.stringify({
                        model: model,
                        input: text
                    })
                });

                if (!response.ok) {
                    // Fallback mechanism: The user might strictly need a Google key for embeddings if OR ones fail or cost too much.
                    // But for now, let's try to gracefully fail.
                    const err = await response.text();
                    throw new Error(`OpenRouter Embedding Failed: ${response.status} - ${err}`);
                }

                const data = await response.json();
                // Standard OpenAI format: { data: [{ embedding: [...] }] }
                return data.data?.[0]?.embedding;
            }
        }

        class VectorStore {
            constructor(dbName = 'EllipsisVectorStore') {
                this.dbName = dbName;
                this.db = null;
                this.ready = this.init();
            }

            init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, 1);
                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        if (!db.objectStoreNames.contains('vectors')) {
                            db.createObjectStore('vectors', { keyPath: 'id' });
                        }
                    };
                    request.onsuccess = (event) => {
                        this.db = event.target.result;
                        resolve();
                    };
                    request.onerror = (event) => reject(event.target.error);
                });
            }

            async add(id, text, vector, metadata = {}) {
                await this.ready;
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction('vectors', 'readwrite');
                    const store = tx.objectStore('vectors');
                    store.put({ id, text, vector, metadata, timestamp: Date.now() });
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);
                });
            }

            async getAll() {
                await this.ready;
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction('vectors', 'readonly');
                    const store = tx.objectStore('vectors');
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async search(queryVector, limit = 5, threshold = 0.0, filterFn = null) {
                const allItems = await this.getAll();
                const scored = allItems.map(item => ({
                    ...item,
                    score: cosineSimilarity(queryVector, item.vector)
                }));

                // Filter by threshold AND optional filterFn on metadata
                const filtered = scored.filter(i =>
                    i.score >= threshold && (!filterFn || filterFn(i.metadata))
                );
                filtered.sort((a, b) => b.score - a.score);

                return filtered.slice(0, limit);
            }

            async checkRedundancy(queryVector, threshold = 0.85) {
                // Returns the single highest matching item IF it exceeds threshold
                const results = await this.search(queryVector, 1, threshold);
                return results.length > 0 ? results[0] : null;
            }

            async clear() {
                await this.ready;
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction('vectors', 'readwrite');
                    tx.objectStore('vectors').clear();
                    tx.oncomplete = () => resolve();
                });
            }
        }

        class GraphManager {
            constructor() {
                // In-memory graph for now, syncs with React State
                // Nodes are Lore Items (by ID/Topic)
                // Edges are defined in metadata
                this.adjList = new Map();
            }

            buildGraph(loreItems) {
                this.adjList.clear();
                loreItems.forEach(item => {
                    if (!this.adjList.has(item.topic)) {
                        this.adjList.set(item.topic, []);
                    }
                    // Parse "connections" or "related_to" from item details if we add that structure later
                    // For now, we can infer some simple links or explicit ones
                    if (item.related_to) {
                        item.related_to.forEach(rel => {
                            this.adjList.get(item.topic).push(rel);
                            // Undirected?
                            if (!this.adjList.has(rel)) this.adjList.set(rel, []);
                            this.adjList.get(rel).push(item.topic);
                        });
                    }
                });
            }

            getNeighbors(topic) {
                return this.adjList.get(topic) || [];
            }

            parseSceneId(sceneId) {
                if (!sceneId) return { act: 0, scene: 0 };
                const parts = String(sceneId).split('.');
                if (parts.length === 2) {
                    return { act: parseInt(parts[0], 10), scene: parseInt(parts[1], 10) };
                }
                const partsHyphen = String(sceneId).split('-');
                if (partsHyphen.length === 2) {
                    return { act: parseInt(partsHyphen[0], 10) + 1, scene: parseInt(partsHyphen[1], 10) + 1 };
                }
                return { act: 0, scene: 0 };
            }

            isPastOrCurrent(targetSceneId, currentSceneId) {
                const t = this.parseSceneId(targetSceneId);
                const c = this.parseSceneId(currentSceneId);
                if (t.act < c.act) return true;
                if (t.act > c.act) return false;
                return t.scene <= c.scene;
            }

            getTemporalEdges(edges, currentSceneId) {
                if (!edges) return [];
                return edges.filter(e => {
                    const sceneId = e.learned_in_scene || e.updated_at_scene || "1.1";
                    return this.isPastOrCurrent(sceneId, currentSceneId);
                });
            }

            getLatestActiveRelations(edges, currentSceneId) {
                const tempEdges = this.getTemporalEdges(edges, currentSceneId);
                const latestMap = new Map();
                tempEdges.forEach(e => {
                    const key = `${e.source}->${e.target}->${e.relation}`;
                    const existing = latestMap.get(key);
                    if (!existing) {
                        latestMap.set(key, e);
                    } else {
                        const existingScene = existing.learned_in_scene || existing.updated_at_scene || "1.1";
                        const currentScene = e.learned_in_scene || e.updated_at_scene || "1.1";
                        if (this.isPastOrCurrent(existingScene, currentScene)) {
                            latestMap.set(key, e);
                        }
                    }
                });
                return Array.from(latestMap.values());
            }
        }

        const ValenceGraph = ({ dataPoints, height = 60 }) => {
            const safeDataPoints = (dataPoints || []).map(val => {
                const parsed = parseInt(val, 10);
                return isNaN(parsed) ? 0 : parsed;
            });
            if (safeDataPoints.length < 2) return null;
            const maxVal = 10, minVal = -10, range = 20;
            const stepX = 100 / (safeDataPoints.length - 1);
            const points = safeDataPoints.map((val, idx) => {
                const normalizedY = 100 - ((val - minVal) / range) * 100;
                return `${idx * stepX},${normalizedY}`;
            }).join(' ');
            const zeroY = 100 - ((0 - minVal) / range) * 100;
            return (
                <div className="w-full" style={{ height: `${height}px` }}>
                    <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none" className="overflow-visible">
                        <line x1="0" y1={zeroY} x2="100" y2={zeroY} stroke="#475569" strokeWidth="1" strokeDasharray="4" />
                        <polyline points={points} fill="none" stroke="#6366f1" strokeWidth="2" vectorEffect="non-scaling-stroke" />
                        {safeDataPoints.map((val, idx) => {
                            const normalizedY = 100 - ((val - minVal) / range) * 100;
                            const color = val > 0 ? '#10b981' : val < 0 ? '#ef4444' : '#94a3b8';
                            return <circle key={idx} cx={`${idx * stepX}`} cy={normalizedY} r="1.5" fill={color} vectorEffect="non-scaling-stroke" />;
                        })}
                    </svg>
                </div>
            );
        };

        const ThreadVisualizer = ({ scenes, threads }) => {
            if (!scenes || !threads || threads.length === 0) return null;

            const laneWidth = 120;
            const rowHeight = 60;
            const svgHeight = (scenes.length + 1) * rowHeight;
            const svgWidth = Math.max(800, threads.length * laneWidth);

            const getThreadX = (index) => index * laneWidth + laneWidth / 2;

            return (
                <div className="overflow-x-auto overflow-y-hidden border border-slate-800 rounded-lg bg-slate-950/30">
                    <svg width={svgWidth} height={svgHeight} className="min-w-full">
                        {/* 1. Draw Thread Lanes (Background) */}
                        {threads.map((t, i) => (
                            <g key={`lane-${t.id}`}>
                                <line
                                    x1={getThreadX(i)} y1={20}
                                    x2={getThreadX(i)} y2={svgHeight}
                                    stroke="#334155" strokeWidth="2" strokeDasharray="4" opacity="0.5"
                                />
                                <text x={getThreadX(i)} y={15} fill="#94a3b8" fontSize="12" textAnchor="middle" fontWeight="bold">
                                    {t.name.length > 15 ? t.name.substring(0, 14) + '...' : t.name}
                                </text>
                            </g>
                        ))}

                        {/* 2. Draw Scene Connections & Knots */}
                        {scenes.map((scene, sceneIdx) => {
                            const y = (sceneIdx + 1) * rowHeight;
                            const activeThreads = threads
                                .map((t, i) => ({ ...t, index: i }))
                                .filter(t => scene.active_thread_ids?.includes(t.id));

                            if (activeThreads.length === 0) return null;

                            // Calculate Interaction Type Styling
                            let interactionColor = "#64748b"; // Isolation (Default)
                            let interactionWidth = 2;

                            if (scene.causality?.interaction_type === "Collision") {
                                interactionColor = "#f43f5e"; // Red
                                interactionWidth = 4;
                            } else if (scene.causality?.interaction_type === "Resonance") {
                                interactionColor = "#3b82f6"; // Blue
                                interactionWidth = 4;
                            } else if (activeThreads.length > 1) {
                                // Fallback if type missing but clearly multiple threads
                                interactionColor = "#a855f7"; // Purple
                            }

                            const minX = Math.min(...activeThreads.map(t => getThreadX(t.index)));
                            const maxX = Math.max(...activeThreads.map(t => getThreadX(t.index)));

                            return (
                                <g key={`scene-row-${sceneIdx}`}>
                                    {/* Connection Line if multiple threads */}
                                    {activeThreads.length > 1 && (
                                        <line
                                            x1={minX} y1={y}
                                            x2={maxX} y2={y}
                                            stroke={interactionColor} strokeWidth={interactionWidth} strokeOpacity="0.8"
                                        />
                                    )}

                                    {/* Nodes */}
                                    {activeThreads.map(t => (
                                        <circle
                                            key={`node-${sceneIdx}-${t.id}`}
                                            cx={getThreadX(t.index)} cy={y} r="6"
                                            fill="#0f172a" stroke={interactionColor} strokeWidth="2"
                                        />
                                    ))}

                                    {/* Label (Scene Title) - positioned near the "center" of the interaction or first thread */}

                                        fill="#e2e8f0" fontSize="11" fontWeight="500"
                                    >
                                        Sc {scene.number}: {scene.title}

                                    {/* Interaction Label */}

                                            {scene.causality.interaction_type}
                                        </text>
                                    )}
                                </g>
                            );
                        })}

            );

            const checkAndExecuteRSI = async (reason, currentStory) => {
                const match = reason.match(/([a-zA-Z\s]+)\s+(?:does not possess|lacks|needs|missing)\s+\[(.*?)\]/i);
                if (!match) return null;

                const charName = match[1].trim();
                const item = match[2].trim();

                showToast(`RSI: Triggered for ${charName} lacking [${item}]. Finding open context slot...`, 'info');

                let openSlot = null;
                
                for (let actIdx = 0; actIdx < currentStory.acts.length; actIdx++) {
                    const scenes = currentStory.scenes[actIdx] || [];
                    for (let sceneIdx = 0; sceneIdx < scenes.length; sceneIdx++) {
                        const scene = scenes[sceneIdx];
                        const sId = `${actIdx}-${sceneIdx}`;
                        const beats = currentStory.beats[sId] || [];
                        
                        if (scene.cast_names && scene.cast_names.includes(charName)) {
                            for (let beatIdx = 0; beatIdx < beats.length; beatIdx++) {
                                const bId = `${sId}-${beatIdx}`;
                                const prose = currentStory.prose[bId];
                                if (prose && prose.final) {
                                    openSlot = { actIdx, sceneIdx, beatIdx, bId, prose: prose.final, sceneTitle: scene.title };
                                    break;
                                }
                            }
                        }
                        if (openSlot) break;
                    }
                    if (openSlot) break;
                }

                if (!openSlot) {
                    console.warn(`RSI: No open context slot found for ${charName} to acquire [${item}].`);
                    return null;
                }

                setLoadingStep(`RSI: Injecting [${item}] into Act ${openSlot.actIdx + 1}, Scene ${openSlot.sceneIdx + 1}, Beat ${openSlot.beatIdx + 1}...`);

                const rsiUserPrompt = `
<prose_to_rewrite>
${openSlot.prose}
</prose_to_rewrite>

<injection_mandate>
Seamlessly include an action where ${charName} acquires or pockets the item: "${item}".
Do not change the scene's emotional climax, value shift, or overall outcome.
</injection_mandate>
`;
                const rsiOutput = await callAI(rsiUserPrompt, PROMPTS.rsiPrompt, false, "RSI Injector", "large");
                const newProse = extractTag(rsiOutput, 'prose_text') || rsiOutput;

                if (!newProse || newProse.trim() === "") {
                    throw new Error("RSI: Failed to generate rewritten prose.");
                }

                const sceneIdStr = `${openSlot.actIdx + 1}.${openSlot.sceneIdx + 1}`;
                const newEdge = {
                    source: charName,
                    target: item,
                    relation: "HAS",
                    learned_in_scene: sceneIdStr,
                    context: `Surgically injected into Act ${openSlot.actIdx + 1}, Scene ${openSlot.sceneIdx + 1}, Beat ${openSlot.beatIdx + 1}`
                };

                setStory(prev => {
                    const nextProse = { ...prev.prose };
                    nextProse[openSlot.bId] = { ...nextProse[openSlot.bId], final: newProse.trim() };
                    const nextEdges = [...(prev.graph_edges || []), newEdge];
                    return {
                        ...prev,
                        prose: nextProse,
                        graph_edges: nextEdges
                    };
                });

                showToast(`RSI: Successfully injected [${item}] into historical prose!`, 'success');
                return { slot: openSlot, item };
            };

            const parseDirectivePlan = (xmlText) => {
                const evaluation = extractTag(xmlText, 'evaluation');
                const actionBlocks = extractAllTags(xmlText, 'action');
                
                const actions = actionBlocks.map(block => {
                    const actionType = extractTag(block, 'action_type').trim();
                    const targetActIdx = parseInt(extractTag(block, 'target_act_idx'), 10);
                    
                    const sceneIdxText = extractTag(block, 'target_scene_idx');
                    const targetSceneIdx = sceneIdxText ? parseInt(sceneIdxText, 10) : null;
                    
                    const beatIdxText = extractTag(block, 'target_beat_idx');
                    const targetBeatIdx = beatIdxText ? parseInt(beatIdxText, 10) : null;
                    
                    const description = extractTag(block, 'description');
                    const detailsBlock = extractTag(block, 'modification_details');
                    
                    const details = {};
                    if (detailsBlock) {
                        details.title = extractTag(detailsBlock, 'title');
                        details.objective = extractTag(detailsBlock, 'objective');
                        details.description = extractTag(detailsBlock, 'description');
                        details.dominant_narrative_mode = extractTag(detailsBlock, 'dominant_narrative_mode');
                        details.cast_names = extractTag(detailsBlock, 'cast_names');
                        details.instructions = extractTag(detailsBlock, 'instructions');
                        details.mode_override = extractTag(detailsBlock, 'mode_override') || extractTag(detailsBlock, 'dominant_narrative_mode') || "";
                        
                        const insertIdxText = extractTag(detailsBlock, 'insert_at_idx');
                        if (insertIdxText) {
                            details.insert_at_idx = parseInt(insertIdxText, 10);
                        }
                    }
                    
                    return {
                        action_type: actionType,
                        target_act_idx: targetActIdx,
                        target_scene_idx: targetSceneIdx,
                        target_beat_idx: targetBeatIdx,
                        description: description,
                        details: details
                    };
                });
                
                return { evaluation, actions };
            };

            const executeDirectivePlan = async (planActions) => {
                setIsExecutingDirective(true);
